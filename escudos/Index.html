<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bolão Oficial - Copa 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { background: #0f1115; color: white; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #1a1d24; padding: 20px; border-radius: 12px; }
        .hidden { display: none !important; }
        input, select { background: #252a34; border: 1px solid #3a4252; color: white; padding: 10px; width: 100%; margin-bottom: 10px; border-radius: 6px; }
        button { background: #007bff; color: white; padding: 12px; border: none; width: 100%; border-radius: 6px; cursor: pointer; margin-bottom: 5px; }
        .btn-alerta { background: #ff3d00; }
        .card-jogo { background: #252a34; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #007bff; }
    </style>
</head>
<body>

<div class="container">
    <button id="btn-admin">Área Admin</button>
    
    <div id="painel-admin" class="hidden">
        <h3>Gerenciamento de Jogos</h3>
        <select id="adm-rodada"><option value="1">Rodada 1</option><option value="2">Rodada 2</option><option value="3">Rodada 3</option></select>
        <input type="text" id="adm-grupo" placeholder="Grupo (ex: A)">
        <input type="text" id="adm-t1" placeholder="Time 1 (ex: BRA)">
        <input type="text" id="adm-t2" placeholder="Time 2 (ex: ARG)">
        <input type="datetime-local" id="adm-data">
        <button id="adm-salvar">Salvar Jogo</button>
        <button id="adm-reset" class="btn-alerta">Resetar Rodada</button>
    </div>

    <div id="lista-jogos"></div>
</div>

<script>
    // Configuração com o seu novo projeto
    const firebaseConfig = {
        apiKey: "AIzaSyDXVtA9Wr02cW9vBtmynMB3O2Zah7AQu34",
        authDomain: "bolao-rodadas-do-brasileirao.firebaseapp.com",
        projectId: "bolao-rodadas-do-brasileirao",
        storageBucket: "bolao-rodadas-do-brasileirao.firebasestorage.app",
        messagingSenderId: "240815445810",
        appId: "1:240815445810:web:2e552bf7bf0685fda7692b"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Função para carregar os jogos direto do novo banco
    function carregarJogos(rodada = "1") {
        database.ref('rodadas/' + rodada).on('value', (snap) => {
            const jogos = snap.val() || {};
            const lista = document.getElementById("lista-jogos");
            lista.innerHTML = "<h4>Jogos Rodada " + rodada + "</h4>";
            
            Object.keys(jogos).forEach(id => {
                const j = jogos[id];
                lista.innerHTML += `
                    <div class="card-jogo">
                        ${j.t1} x ${j.t2} (Grupo ${j.grupo})
                    </div>`;
            });
        });
    }

    // Salvar novo jogo
    document.getElementById("adm-salvar").onclick = () => {
        const rodada = document.getElementById("adm-rodada").value;
        const jogo = {
            grupo: document.getElementById("adm-grupo").value,
            t1: document.getElementById("adm-t1").value,
            t2: document.getElementById("adm-t2").value,
            data: document.getElementById("adm-data").value
        };
        database.ref('rodadas/' + rodada).push(jogo).then(() => alert("Jogo salvo!"));
    };

    // Resetar rodada
    document.getElementById("adm-reset").onclick = () => {
        const rodada = document.getElementById("adm-rodada").value;
        if(confirm("Apagar todos os jogos da rodada " + rodada + "?")) {
            database.ref('rodadas/' + rodada).remove();
        }
    };

    // Toggle Admin
    document.getElementById("btn-admin").onclick = () => 
        document.getElementById("painel-admin").classList.toggle("hidden");

    // Inicialização
    carregarJogos("1");
    document.getElementById("adm-rodada").onchange = (e) => carregarJogos(e.target.value);
</script>
</body>
</html>
