<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Oficial - Gestão Dinâmica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css"/>
    <style>

    </style>
</head>
<body>
    <script>
        const firebaseConfig = { /* (Seus dados originais) */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Variável global que será preenchida pelo Firebase
        let rodadasBolao = { "1": [], "2": [], "3": [] };

        // 1. CARREGAR JOGOS DO FIREBASE (substitui a lista estática)
        function carregarJogosDoFirebase() {
            database.ref('jogos_cadastrados').on('value', (snapshot) => {
                const dados = snapshot.val() || {};
                rodadasBolao = { "1": [], "2": [], "3": [] };
                
                Object.values(dados).forEach(jogo => {
                    if(rodadasBolao[jogo.rodada]) {
                        rodadasBolao[jogo.rodada].push(jogo);
                    }
                });
                
                Object.keys(rodadasBolao).forEach(r => {
                    rodadasBolao[r].sort((a, b) => new Date(a.data) - new Date(b.data));
                });
                
                renderizarJogosRodadaAtiva();
            });
        }

        // 2. ADICIONAR NOVA FUNÇÃO DE ADMIN PARA CADASTRAR JOGOS
        // Adicione isso no seu painel admin (ou crie um novo botão/input no painel)
        function adminCadastrarJogo(jogoObj) {
            // jogoObj = {id, rodada, grupo, t1, sigla1, t2, sigla2, data}
            database.ref('jogos_cadastrados/' + jogoObj.id).set(jogoObj).then(() => {
                alert("Jogo salvo no banco com sucesso!");
            });
        }

        // 3. ATUALIZAÇÃO NO DOCUMENT.READY
        document.addEventListener("DOMContentLoaded", () => {
            carregarJogosDoFirebase(); // Agora chama o Firebase ao iniciar
            // ... (restante das suas inicializações originais)
        });

        // 4. CORREÇÃO NA FUNÇÃO DE SALVAR RESULTADOS (ADMIN)
        function salvarResultadosOficiaisAdmin() {
            database.ref('resultados_oficiais').once('value').then((snapshot) => {
                let dadosOficiais = snapshot.val() || {};
                
                // Agora ele usa a rodadasBolao que foi carregada dinamicamente
                rodadasBolao[rodadaAtiva].forEach(jogo => {
                    const val1 = document.getElementById(`p1-${jogo.id}`).value;
                    const val2 = document.getElementById(`p2-${jogo.id}`).value;
                    if(val1 !== "" && val2 !== "") {
                        dadosOficiais[`p1-${jogo.id}`] = parseInt(val1);
                        dadosOficiais[`p2-${jogo.id}`] = parseInt(val2);
                    }
                });

                database.ref('resultados_oficiais').set(dadosOficiais).then(() => {
                    recalcularPontuacoesGerais(dadosOficiais);
                });
            });
        }
        
        // ... (Mantenha o restante das suas funções originais inalteradas)
    </script>
</body>
</html>
