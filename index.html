<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA MAUBET v23.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); margin-top: 10px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.3s; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-red { background: #ff4444; color: #fff; font-size: 11px; padding: 10px; margin-top: 20px; }
        
        .saudacao { font-weight: bold; color: var(--primary); margin-bottom: 15px; font-size: 18px; text-align: center; width: 100%; }
        .jogo-item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .time-box { width: 35%; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center; }
        .escudo { width: 40px; height: 40px; object-fit: contain; display: block; margin: 0 auto 5px; }
        .placar { width: 48px; height: 45px; background: #000; border: 1px solid var(--primary); color: #fff; text-align: center; font-size: 20px; font-weight: bold; border-radius: 8px; }

        .painel-mestre { background: #000; padding: 15px; border-radius: 15px; border: 2px dashed var(--accent); margin-bottom: 20px; text-align: left; }
        .lista-gestao { margin-top: 15px; background: #111; border-radius: 10px; padding: 10px; }
        .item-apostador { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #222; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="msg-saudacao" class="saudacao"></div>

    <div class="card">
        <div id="tela-login">
            <h2 style="margin-top:0">MAU<span>BET</span></h2>
            <input type="text" id="nome" placeholder="NOME COMPLETO">
            <input type="tel" id="tel" placeholder="DDD + CELULAR">
            <div id="recaptcha-container"></div>
            <button class="btn-green" onclick="enviarSMS()">ENTRAR</button>
        </div>

        <div id="tela-sms" class="hidden">
            <input type="number" id="codigo-input" placeholder="CÓDIGO OU SENHA">
            <button class="btn-green" onclick="validarAcesso()">VALIDAR</button>
        </div>

        <div id="tela-principal" class="hidden">
            <div id="area-cadastro" class="hidden">
                <div class="painel-mestre">
                    <b style="color:var(--accent)">1. CADASTRE OS TIMES:</b>
                    <input type="text" id="m-casa" placeholder="TIME CASA">
                    <input type="text" id="m-fora" placeholder="TIME FORA">
                    <button class="btn-accent" onclick="salvarJogo()">+ ADICIONAR À LISTA</button>
                    
                    <button class="btn-green" style="margin-top:20px; border: 2px solid #fff" onclick="finalizarRodada()">
                        🚀 FINALIZAR E LIBERAR RODADA
                    </button>
                    <button class="btn-red" onclick="limparTudo()">APAGAR TODOS OS TIMES</button>
                </div>
            </div>

            <div id="area-gestao" class="hidden">
                <div class="painel-mestre">
                    <b style="color:var(--primary)">2. CONTROLE DA RODADA:</b>
                    <div id="lista-admin-clientes" class="lista-gestao"></div>
                    <button class="btn-accent" onclick="voltarCadastro()" style="font-size:10px; margin-top:10px">EDITAR TIMES NOVAMENTE</button>
                </div>
            </div>

            <div id="lista-jogos"></div>
            <button id="btn-enviar" class="hidden btn-green" onclick="enviarBilhete()">🔒 ENVIAR MEU BILHETE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", 
        authDomain: "bolao-d2baf.firebaseapp.com", 
        projectId: "bolao-d2baf", 
        storageBucket: "bolao-d2baf.firebasestorage.app", 
        messagingSenderId: "955171998764", 
        appId: "1:955171998764:web:2ccf8f2b6f23c300755589" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const SENHA_MESTRE = "259225";
    let confirmacaoSMS;

    window.onload = () => {
        if(localStorage.getItem('maubet_sessao')) abrirPainel();
    };

    function enviarSMS() {
        const nome = document.getElementById('nome').value.toUpperCase();
        const tel = "+55" + document.getElementById('tel').value.replace(/\D/g, '');
        localStorage.setItem('maubet_nome_temp', nome);
        auth.signInWithPhoneNumber(tel, new firebase.auth.RecaptchaVerifier('recaptcha-container', {size:'invisible'})).then(res => {
            confirmacaoSMS = res;
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-sms').classList.remove('hidden');
        });
    }

    function validarAcesso() {
        const cod = document.getElementById('codigo-input').value;
        if(cod === SENHA_MESTRE) {
            localStorage.setItem('maubet_nome', "MESTRE");
            localStorage.setItem('maubet_sessao', 'mestre');
            abrirPainel();
        } else {
            confirmacaoSMS.confirm(cod).then(() => {
                localStorage.setItem('maubet_nome', localStorage.getItem('maubet_nome_temp'));
                localStorage.setItem('maubet_sessao', 'cliente');
                abrirPainel();
            }).catch(() => alert("Código inválido!"));
        }
    }

    function abrirPainel() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-sms').classList.add('hidden');
        document.getElementById('tela-principal').classList.remove('hidden');
        document.getElementById('msg-saudacao').innerText = obterSaudacao();
        
        db.collection("config").doc("status").onSnapshot(doc => {
            const mestre = localStorage.getItem('maubet_sessao') === 'mestre';
            const liberada = doc.exists && doc.data().liberada;

            if(mestre) {
                if(liberada) {
                    document.getElementById('area-cadastro').classList.add('hidden');
                    document.getElementById('area-gestao').classList.remove('hidden');
                } else {
                    document.getElementById('area-cadastro').classList.remove('hidden');
                    document.getElementById('area-gestao').classList.add('hidden');
                }
                carregarAdmin();
            }
            if(liberada || mestre) carregarJogos();
            else document.getElementById('lista-jogos').innerHTML = "<p>Aguardando liberação do Mestre...</p>";
        });
    }

    // CORREÇÃO: SALVAR E LIMPAR CAMPOS
    async function salvarJogo() {
        const inCasa = document.getElementById('m-casa');
        const inFora = document.getElementById('m-fora');
        const c = inCasa.value.toUpperCase().trim();
        const f = inFora.value.toUpperCase().trim();
        
        if(c && f) {
            await db.collection("jogos").add({ 
                home: c, away: f, 
                timestamp: firebase.firestore.FieldValue.serverTimestamp() 
            });
            // LIMPA OS CAMPOS AUTOMATICAMENTE
            inCasa.value = "";
            inFora.value = "";
            inCasa.focus(); // Coloca o cursor de volta no primeiro campo
        }
    }

    async function finalizarRodada() {
        await db.collection("config").doc("status").set({ liberada: true });
    }

    async function voltarCadastro() {
        await db.collection("config").doc("status").set({ liberada: false });
    }

    async function limparTudo() {
        if(confirm("Deseja apagar todos os times cadastrados?")) {
            const snap = await db.collection("jogos").get();
            snap.forEach(doc => doc.ref.delete());
        }
    }

    function carregarJogos() {
        db.collection("jogos").orderBy("timestamp", "asc").onSnapshot(snap => {
            const l = document.getElementById('lista-jogos');
            l.innerHTML = "";
            snap.forEach(doc => {
                const j = doc.data();
                const c = j.home.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                const f = j.away.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                l.innerHTML += `
                    <div class="jogo-item">
                        <div class="time-box"><img src="escudos/${c}.png" class="escudo" onerror="this.src='escudos/default.png'">${j.home}</div>
                        <div style="display:flex; gap:5px">
                            <input type="number" class="placar" id="${doc.id}-h" oninput="checarBotao()">
                            <input type="number" class="placar" id="${doc.id}-f" oninput="checarBotao()">
                        </div>
                        <div class="time-box"><img src="escudos/${f}.png" class="escudo" onerror="this.src='escudos/default.png'">${j.away}</div>
                    </div>`;
            });
        });
    }

    function carregarAdmin() {
        db.collection("apostas").orderBy("timestamp", "desc").onSnapshot(snap => {
            const l = document.getElementById('lista-admin-clientes');
            l.innerHTML = "<b>APOSTADORES:</b>";
            snap.forEach(doc => {
                const a = doc.data();
                l.innerHTML += `
                    <div class="item-apostador">
                        <span>${a.nome}</span>
                        <button onclick="validar('${doc.id}', ${!a.pago})" style="background:${a.pago?'#00ff88':'#444'}">
                            ${a.pago?'PAGO ✅':'VALIDAR PIX'}
                        </button>
                    </div>`;
            });
        });
    }

    function checarBotao() {
        const inputs = document.querySelectorAll('.placar');
        if(Array.from(inputs).every(i => i.value !== "") && inputs.length > 0) 
            document.getElementById('btn-enviar').classList.remove('hidden');
    }

    async function validar(id, st) { await db.collection("apostas").doc(id).update({ pago: st }); }

    function obterSaudacao() {
        const h = new Date().getHours();
        const n = localStorage.getItem('maubet_nome') || "";
        let s = (h < 12) ? "Bom dia" : (h < 18) ? "Boa tarde" : "Boa noite";
        return `${s}, ${n.split(' ')[0]}!`;
    }

    async function enviarBilhete() {
        const p = {}; document.querySelectorAll('.placar').forEach(i => p[i.id] = i.value);
        await db.collection("apostas").add({
            nome: localStorage.getItem('maubet_nome'),
            palpites: p, pago: false, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Enviado com sucesso! Aguarde a validação.");
        location.reload();
    }
</script>
</body>
</html>
