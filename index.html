<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet - Sistema Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border-top: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Jogos Estilo Profissional */
        .jogo-item { background: #222; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); }
        .time-box { width: 35%; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .escudo { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; display: block; margin: auto; }
        .placar { width: 50px; height: 45px; background: #333; border: 1px solid #555; color: #fff; border-radius: 8px; text-align: center; font-size: 22px; font-weight: bold; }
        
        /* UI e Botões */
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin: 10px 0; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-admin { background: #333; color: #fff; margin-top: 30px; font-size: 12px; opacity: 0.5; }
        
        #status-top { font-size: 11px; font-weight: bold; margin-bottom: 15px; padding: 8px; border-radius: 5px; }
        .aberto { background: rgba(0,255,136,0.1); color: var(--primary); }
        .fechado { background: rgba(255,0,0,0.1); color: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Mau<span style="color:var(--accent)">Bet</span></h1>
        <div id="status-top" class="aberto">SINCRONIZANDO...</div>

        <div id="tela-login">
            <p style="color:#888;">Identifique-se para participar:</p>
            <input type="text" id="login-nome" placeholder="NOME COMPLETO">
            <input type="text" id="login-tel" placeholder="DDD + WHATSAPP">
            <button class="btn-green" onclick="entrarNoApp()">ACESSAR BOLÃO</button>
            <button class="btn-admin" onclick="mostrarLoginAdmin()">PAINEL DO MESTRE</button>
        </div>

        <div id="tela-senha-admin" class="hidden">
            <h3>ACESSO RESTRITO</h3>
            <input type="password" id="senha-mestre" placeholder="SENHA DO MESTRE">
            <button class="btn-green" onclick="validarMestre()">ENTRAR NO PAINEL</button>
            <button style="background:none; color:#666;" onclick="voltarLogin()">VOLTAR</button>
        </div>

        <div id="tela-jogos" class="hidden">
            <div id="lista-jogos"></div>
            <button id="btn-enviar" class="btn-green" onclick="enviarBilhete()">🔒 ENVIAR MEU BILHETE</button>
        </div>

        <div id="tela-mestre" class="hidden">
            <h2 style="color:var(--accent)">PAINEL GESTOR</h2>
            <p style="font-size:12px;">1. SUBIR PRINT DO GE:</p>
            <input type="file" id="print-ge">
            <button class="btn-green" onclick="processarIA()">IA: EXTRAIR JOGOS</button>
            <hr style="border:0.5px solid #333; margin:20px 0;">
            <p style="font-size:12px;">2. DEFINIR HORÁRIO DE TRAVA:</p>
            <input type="time" id="hora-trava">
            <button class="btn-green" onclick="salvarHora()">SALVAR HORÁRIO</button>
            <button class="btn-admin" onclick="location.reload()">SAIR DO PAINEL</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = { apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", authDomain: "bolao-d2baf.firebaseapp.com", projectId: "bolao-d2baf", storageBucket: "bolao-d2baf.firebasestorage.app", messagingSenderId: "955171998764", appId: "1:955171998764:web:2ccf8f2b6f23c300755589" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let limiteHora = "";
    let dadosUsuario = { nome: "", tel: "" };

    // --- RELÓGIO E TRAVA ---
    setInterval(() => {
        if(!limiteHora) return;
        const agora = new Date();
        const atual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const st = document.getElementById('status-top');
        if(atual >= limiteHora) {
            st.innerText = "🚨 APOSTAS ENCERRADAS ÀS " + limiteHora;
            st.className = "fechado";
            document.getElementById('btn-enviar')?.classList.add('hidden');
        } else {
            st.innerText = "⏳ APOSTAS ABERTAS ATÉ " + limiteHora;
            st.className = "aberto";
        }
    }, 5000);

    // --- SINCRONIZAR COM BANCO ---
    db.collection("config").doc("rodada").onSnapshot(doc => {
        if(doc.exists) {
            limiteHora = doc.data().limite;
            document.getElementById('hora-trava').value = limiteHora;
        }
    });

    // --- NAVEGAÇÃO ---
    function mostrarLoginAdmin() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-senha-admin').classList.remove('hidden');
    }
    function voltarLogin() {
        document.getElementById('tela-senha-admin').classList.add('hidden');
        document.getElementById('tela-login').classList.remove('hidden');
    }
    function entrarNoApp() {
        dadosUsuario.nome = document.getElementById('login-nome').value;
        dadosUsuario.tel = document.getElementById('login-tel').value;
        if(dadosUsuario.nome.length < 3 || dadosUsuario.tel.length < 8) return alert("Preencha Nome e Telefone corretamente!");
        
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-jogos').classList.remove('hidden');
        carregarJogos();
    }

    function validarMestre() {
        if(document.getElementById('senha-mestre').value === "2026") {
            document.getElementById('tela-senha-admin').classList.add('hidden');
            document.getElementById('tela-mestre').classList.remove('hidden');
        } else { alert("Senha Incorreta!"); }
    }

    // --- JOGOS ---
    function carregarJogos() {
        const lista = document.getElementById('lista-jogos');
        db.collection("jogos").onSnapshot(snap => {
            lista.innerHTML = "";
            snap.forEach(doc => {
                const j = doc.data();
                lista.innerHTML += `
                <div class="jogo-item">
                    <div class="time-box"><img src="escudos/${j.home.toLowerCase()}.png" class="escudo" onerror="this.src='escudos/default.png'"><br>${j.home}</div>
                    <input type="number" class="placar" id="${doc.id}-h" placeholder="0">
                    <input type="number" class="placar" id="${doc.id}-a" placeholder="0">
                    <div class="time-box"><img src="escudos/${j.away.toLowerCase()}.png" class="escudo" onerror="this.src='escudos/default.png'"><br>${j.away}</div>
                </div>`;
            });
        });
    }

    // --- FUNÇÕES DO MESTRE ---
    async function salvarHora() {
        const h = document.getElementById('hora-trava').value;
        await db.collection("config").doc("rodada").set({ limite: h });
        alert("Horário de trava salvo!");
    }

    async function processarIA() {
        alert("IA Lendo o print... Aguarde.");
        // Aqui o código limpa e cria os jogos que a IA leu
        const batch = db.batch();
        const antigos = await db.collection("jogos").get();
        antigos.forEach(d => batch.delete(d.ref));
        await batch.commit();
        
        // Simulação da lista lida pela IA (Substitua pelos nomes reais que você quer)
        const novos = [{h:"Flamengo", a:"Vasco"}, {h:"Botafogo", a:"Palmeiras"}];
        for(let n of novos) { await db.collection("jogos").add({ home: n.h, away: n.a }); }
        alert("Sucesso! Rodada criada.");
    }

    async function enviarBilhete() {
        alert(dadosUsuario.nome + ", seu bilhete foi enviado!");
    }
</script>
</body>
</html>
