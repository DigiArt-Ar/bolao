<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v15.0 - PAINEL MASTER TOTAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding-bottom: 120px; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; border-top: 6px solid var(--primary); box-shadow: 0 20px 60px rgba(0,0,0,0.9); text-align: center; margin-top: 20px; }
        
        h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 900; }
        h1 span { color: var(--accent); }

        #barra-status { font-size: 12px; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-weight: 900; text-transform: uppercase; border: 1px solid #333; }
        .aberto { background: rgba(0, 255, 136, 0.1); color: var(--primary); border-color: var(--primary); }
        .fechado { background: rgba(255, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

        .jogo-card { background: #222; border-radius: 18px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid var(--accent); }
        .time-info { width: 35%; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .placar-box { width: 55px; height: 50px; background: #333; border: 2px solid #444; color: #fff; border-radius: 12px; text-align: center; font-size: 26px; font-weight: bold; }

        .hidden { display: none !important; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin: 12px 0; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-gray { background: #333; color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        .btn-master-fixo { position: fixed; bottom: 20px; width: 90%; max-width: 460px; background: #111; border: 1px solid var(--primary); color: var(--primary); padding: 15px; font-size: 12px; border-radius: 15px; z-index: 9999; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-body { background: var(--card); padding: 35px; border-radius: 30px; border: 2px solid var(--accent); width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>MAU<span>BET</span></h1>
        <div id="barra-status" class="aberto">SISTEMA ONLINE</div>

        <div id="tela-login" class="tela">
            <p style="color: #888;">Digite seu nome e telefone:</p>
            <input type="text" id="input-nome" placeholder="NOME COMPLETO">
            <input type="tel" id="input-tel" placeholder="DDD + CELULAR">
            <div id="recaptcha-container"></div>
            <button class="btn-green" onclick="enviarSMS()">RECEBER CÓDIGO SMS</button>
        </div>

        <div id="tela-codigo" class="hidden tela">
            <p>Digite o código recebido:</p>
            <input type="number" id="input-confirm" placeholder="000000">
            <button class="btn-green" onclick="validarEntrada()">ENTRAR NO BOLÃO</button>
            <button class="btn-gray" onclick="location.reload()">VOLTAR</button>
        </div>

        <div id="tela-jogos" class="hidden tela">
            <div id="lista-jogos"></div>
            <button id="btn-finalizar" class="btn-green" onclick="abrirModal()">🔒 FINALIZAR BILHETE</button>
        </div>

            <h3 style="color:var(--primary)">ACESSO RESTRITO GESTOR</h3>
