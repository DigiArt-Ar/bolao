<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão DigiArt ⚽</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #004d40; color: #fff; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 400px; margin: auto; }
        h1 { color: #e65100; margin-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #e65100; }
        button { background: #e65100; color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; width: 95%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #bf360c; }
        .hidden { display: none; }
        #adminPanel { background: #fff3e0; border: 2px dashed #e65100; padding: 15px; border-radius: 15px; margin-top: 20px; color: #333; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>DigiArt Bolão ⚽</h1>
    <p id="statusMsg" style="color: #666;">Entre para dar seus palpites!</p>

    <div id="loginArea">
        <input type="text" id="userName" placeholder="Seu Nome Completo">
        <input type="tel" id="userPhone" placeholder="+55 24 98103-5118">
        <div id="recaptcha-container"></div>
        <button onclick="enviarSMS()">RECEBER CÓDIGO SMS</button>
    </div>

    <div id="otpArea" class="hidden">
        <p>Aguardando SMS...</p>
        <h2 id="timer" style="color: #e65100;">01:00</h2>
        <input type="number" id="otpCode" placeholder="Código de 6 dígitos">
        <button onclick="confirmarCodigo()">VALIDAR ACESSO</button>
    </div>

    <div id="masterPassArea" class="hidden">
        <h3 style="color: #d32f2f;">🔐 ACESSO MASTER</h3>
        <p>Olá Maumau, digite sua senha secreta:</p>
        <input type="password" id="masterPass" placeholder="Senha de 6 dígitos">
        <button onclick="validarSenhaMaster()" style="background: #333;">ENTRAR NO PAINEL</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h3>🛠️ GERENCIAR RODADA</h3>
        <button onclick="alert('IA de leitura em breve!')" style="background: #00796b;">📸 LER PRINT DA RODADA</button>
        <hr>
        <p>Trava de apostas:</p>
        <input type="datetime-local" id="lockTime">
        <button style="background: #c62828; margin-top: 10px;">🔴 ZERAR TUDO</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE (O QUE VOCÊ ME MANDOU)
    const firebaseConfig = {
      apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU",
      authDomain: "bolao-d2baf.firebaseapp.com",
      projectId: "bolao-d2baf",
      storageBucket: "bolao-d2baf.firebasestorage.app",
      messagingSenderId: "955171998764",
      appId: "1:955171998764:web:2ccf8f2b6f23c300755589"
    };

    // Inicializa Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let confirmationResult;
    const MASTER_PHONE = "+5524981035118";
    const MASTER_PASS_SECRET = "931480"; // Sua senha Master

    // Configura o Recaptcha invisível para o SMS
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'invisible'
    });

    function enviarSMS() {
        const phoneNumber = document.getElementById('userPhone').value.trim();
        const appVerifier = window.recaptchaVerifier;

        auth.signInWithPhoneNumber(phoneNumber, appVerifier)
            .then((result) => {
                confirmationResult = result;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('otpArea').classList.remove('hidden');
                document.getElementById('statusMsg').innerText = "Código enviado!";
                startTimer();
            }).catch((error) => {
                alert("Erro ao enviar SMS: " + error.message);
            });
    }

    function startTimer() {
        let time = 60;
        const timerElem = document.getElementById('timer');
        const countdown = setInterval(() => {
            time--;
            timerElem.innerText = 00:${time < 10 ? '0' : ''}${time};
            if(time <= 0) clearInterval(countdown);
        }, 1000);
    }

    function confirmarCodigo() {
        const code = document.getElementById('otpCode').value;
        confirmationResult.confirm(code).then((result) => {
            const user = result.user;
            verificarPerfil(user.phoneNumber);
        }).catch((error) => {
            alert("Código inválido!");
        });
    }

    function verificarPerfil(phone) {
        // Se for o seu número oficial
        if(phone === MASTER_PHONE) {
            document.getElementById('otpArea').classList.add('hidden');
            document.getElementById('masterPassArea').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "Identidade confirmada.";
        } else {
            document.getElementById('otpArea').classList.add('hidden');
            document.getElementById('statusMsg').innerText = "Bem-vindo ao Bolão!";
            alert("Você entrou como apostador!");
        }
    }

    function validarSenhaMaster() {
        const pass = document.getElementById('masterPass').value;
        if(pass === MASTER_PASS_SECRET) {
            document.getElementById('masterPassArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "MODO ADMINISTRADOR ATIVO";
        } else {
            alert("Senha Master Incorreta!");
        }
    }
</script>

</body>
</html>
