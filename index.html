<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 - Bolão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           ESTILIZAÇÃO VISUAL (CSS)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1a1d24;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        h2, h3 {
            margin-bottom: 15px;
            text-align: center;
        }

        p {
            margin-bottom: 15px;
            color: #ccc;
            text-align: center;
            font-size: 14px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2f3a;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        #btn-admin {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        #btn-admin:hover { color: #fff; }

        input[type="text"], input[type="number"] {
            background-color: #252a34;
            border: 1px solid #3a4252;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            outline: none;
        }

        input[type="text"] { width: 100%; margin-bottom: 20px; font-size: 16px; }

        button {
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        .btn-sucesso { background-color: #00c853; }
        .btn-sucesso:hover { background-color: #00a844; }

        .btn-alerta { background-color: #ff3d00; }
        .btn-alerta:hover { background-color: #dd3300; }

        .btn-secundario { background-color: #4b5563; }
        .btn-secundario:hover { background-color: #374151; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: #252a34;
            color: #aaa;
            padding: 10px;
            font-size: 14px;
        }

        .tab-btn.active {
            background-color: #007bff;
            color: #fff;
        }

        .aviso-trava {
            font-size: 13px;
            color: #ffb300;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        #lista-jogos {
            margin-bottom: 20px;
        }

        .card-jogo {
            background-color: #252a34;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #007bff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-jogo {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .confronto {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time { 
            width: 35%; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600;
        }
        
        .placar-inputs { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        
        .placar-inputs input { 
            width: 45px; 
            height: 38px; 
            font-size: 18px; 
            font-weight: bold;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .linha-ranking {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #2a2f3a;
        }
        
        .cabecalho-ranking {
            font-weight: bold;
            border-bottom: 2px solid #007bff;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div id="tela-login" class="container">
        <h2>Bolão Copa 2026</h2>
        <p>Digite seu nome para entrar no bolão:</p>
        <input type="text" id="input-nome" placeholder="Seu nome ou apelido">
        <button id="btn-entrar" class="btn-sucesso">Confirmar e Entrar</button>
    </div>

    <div id="tela-principal" class="container hidden">
        <header>
            <span id="boas-vindas">Olá, <strong id="nome-usuario"></strong></span>
            <button id="btn-admin" title="Área do Administrador"><i class="fas fa-cog"></i></button>
        </header>

        <div class="tabs">
            <button id="tab-palpites" class="tab-btn active">Meus Palpites</button>
            <button id="tab-ranking" class="tab-btn">Ranking Geral</button>
        </div>

        <div id="conteudo-palpites" class="tab-conteudo">
            <p class="aviso-trava">Os palpites travam 30 minutos antes do primeiro jogo!</p>
            <div id="lista-jogos">
                </div>
            
            <button id="btn-salvar-palpites" class="btn-sucesso">Salvar Todos os Palpites</button>
            <button id="btn-cancelar-admin" class="btn-secundario hidden">Cancelar / Voltar</button>
        </div>

        <div id="conteudo-ranking" class="tab-conteudo hidden">
            <h3>Classificação Geral</h3>
            <div id="lista-ranking">
                </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU",
            authDomain: "bolao-d2baf.firebaseapp.com",
            databaseURL: "https://bolao-d2baf-default-rtdb.firebaseio.com/",
            projectId: "bolao-d2baf",
            storageBucket: "bolao-d2baf.firebasestorage.app",
            messagingSenderId: "955171998764",
            appId: "1:955171998764:web:2ccf8f2b6f23c300755589"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // LISTA DE JOGOS
        // !!! PARA O SEU TESTE DE HOJE !!!
        // Mude o horário de "2026-06-09T14:00:00" para o momento que você quiser testar a trava.
        // Lembre-se: o sistema vai travar as caixas de texto exatos 30 minutos ANTES desse horário.
        const jogosBolao = [
            { id: "j01", grupo: "A", t1: "México", t2: "Croácia", data: "2026-06-09T14:00:00" }, 
            { id: "j02", grupo: "A", t1: "Croácia", t2: "Coreia do Sul", data: "2026-06-24T21:00:00" },
            { id: "j03", grupo: "B", t1: "Inglaterra", t2: "Equador", data: "2026-06-22T21:00:00" },
            { id: "j04", grupo: "B", t1: "Equador", t2: "Nigéria", data: "2026-06-17T14:00:00" },
            { id: "j05", grupo: "C", t1: "Uruguai", t2: "Romênia", data: "2026-06-23T18:00:00" },
            { id: "j06", grupo: "C", t1: "Marrocos", t2: "Uruguai", data: "2026-06-15T21:00:00" },
            { id: "j07", grupo: "D", t1: "Dinamarca", t2: "Turquia", data: "2026-06-17T18:00:00" },
            { id: "j08", grupo: "D", t1: "Estados Unidos", t2: "Dinamarca", data: "2026-06-23T21:00:00" },
            { id: "j09", grupo: "E", t1: "Colômbia", t2: "Suíça", data: "2026-06-18T15:00:00" },
            { id: "j10", grupo: "E", t1: "Suíça", t2: "Japão", data: "2026-06-24T15:00:00" },
            { id: "j11", grupo: "F", t1: "Itália", t2: "Paraguai", data: "2026-06-18T21:00:00" },
            { id: "j12", group: "F", t1: "Ucrânia", t2: "Paraguai", data: "2026-06-25T15:00:00" },
            { id: "j13", grupo: "G", t1: "França", t2: "Suécia", data: "2026-06-19T21:00:00" },
            { id: "j14", grupo: "G", t1: "Suécia", t2: "Irã", data: "2026-06-25T21:00:00" },
            { id: "j15", grupo: "H", t1: "Espanha", t2: "Tunísia", data: "2026-06-20T15:00:00" },
            { id: "j16", grupo: "H", t1: "Tunísia", t2: "Austrália", data: "2026-06-26T15:00:00" },
            { id: "j17", grupo: "I", t1: "Holanda", t2: "Escócia", data: "2026-06-20T21:00:00" },
            { id: "j18", grupo: "I", t1: "Gana", t2: "Escócia", data: "2026-06-16T15:00:00" },
            { id: "j19", grupo: "J", t1: "Bélgica", t2: "Chile", data: "2026-06-21T15:00:00" },
            { id: "j20", grupo: "J", t1: "Chile", t2: "Argélia", data: "2026-06-27T15:00:00" },
            { id: "j21", grupo: "K", t1: "Portugal", t2: "Camarões", data: "2026-06-21T21:00:00" },
            { id: "j22", grupo: "K", t1: "Camarões", t2: "Polônia", data: "2026-06-27T21:00:00" },
            { id: "j23", grupo: "L", t1: "Argentina", t2: "Sérvia", data: "2026-06-22T15:00:00" },
            { id: "j24", grupo: "L", t1: "Sérvia", t2: "Canadá", data: "2026-06-14T18:00:00" }
        ];

        const SENHA_ADMIN_PRE_ESTABELECIDA = "1052";
        let isAdmin = false;
        let meuNomeUsuario = "";

        document.addEventListener("DOMContentLoaded", () => {
            renderizarJogos();
            checarUsuarioExistente();
            ouvirRankingDoFirebase();

            document.getElementById("btn-admin").addEventListener("click", () => {
                const senhaDigitada = prompt("Digite a senha Master do Administrador:");
                if (senhaDigitada === SENHA_ADMIN_PRE_ESTABELECIDA) {
                    isAdmin = true;
                    liberarModoAdminVisual();
                } else {
                    alert("Senha incorreta!");
                }
            });

            document.getElementById("btn-cancelar-admin").addEventListener("click", () => {
                isAdmin = false;
                puxarMeusPalpitesDoFirebase();
            });

            document.getElementById("tab-palpites").addEventListener("click", () => alternarAbas("palpites"));
            document.getElementById("tab-ranking").addEventListener("click", () => alternarAbas("ranking"));

            document.getElementById("btn-entrar").addEventListener("click", () => {
                const nome = document.getElementById("input-nome").value.trim().replace(/[.#$\[\]]/g, "");
                if (nome) {
                    localStorage.setItem("bolao_nome_usuario", nome);
                    mostrarTelaPrincipal(nome);
                } else {
                    alert("Por favor, digite seu nome!");
                }
            });

            document.getElementById("btn-salvar-palpites").addEventListener("click", () => {
                if (isAdmin) {
                    salvarResultadosOficiaisAdmin();
                } else {
                    salvarPalpitesUsuario();
                }
            });
            
            // Fica rodando um cronômetro a cada 5 segundos para verificar se o tempo expirou e travar a tela dinamicamente
            setInterval(checarTravaDoSistema, 5000);
        });

        function renderizarJogos() {
            const listaDiv = document.getElementById("lista-jogos");
            listaDiv.innerHTML = "";
            jogosBolao.forEach(jogo => {
                const dataFormatada = new Date(jogo.data).toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
                const card = document.createElement("div");
                card.className = "card-jogo";
                card.innerHTML = `
                    <div class="info-jogo">Grupo ${jogo.grupo} — ${dataFormatada}</div>
                    <div class="confronto">
                        <span class="time">${jogo.t1}</span>
                        <div class="placar-inputs">
                            <input type="number" id="p1-${jogo.id}" min="0" disabled placeholder="-">
                            <span>x</span>
                            <input type="number" id="p2-${jogo.id}" min="0" disabled placeholder="-">
                        </div>
                        <span class="time">${jogo.t2}</span>
                    </div>
                `;
                listaDiv.appendChild(card);
            });
        }

        function checarUsuarioExistente() {
            const nomeSalvo = localStorage.getItem("bolao_nome_usuario");
            if (nomeSalvo) {
                mostrarTelaPrincipal(nomeSalvo);
            }
        }

        function mostrarTelaPrincipal(nome) {
            meuNomeUsuario = nome;
            document.getElementById("tela-login").classList.add("hidden");
            document.getElementById("tela-principal").classList.remove("hidden");
            document.getElementById("nome-usuario").innerText = nome;
            puxarMeusPalpitesDoFirebase();
        }

        function puxarMeusPalpitesDoFirebase() {
            database.ref('participantes/' + meuNomeUsuario + '/palpites').once('value').then((snapshot) => {
                const palpites = snapshot.val() || {};
                jogosBolao.forEach(jogo => {
                    document.getElementById(`p1-${jogo.id}`).value = palpites[`p1-${jogo.id}`] !== undefined ? palpites[`p1-${jogo.id}`] : "";
                    document.getElementById(`p2-${jogo.id}`).value = palpites[`p2-${jogo.id}`] !== undefined ? palpites[`p2-${jogo.id}`] : "";
                });
                checarTravaDoSistema();
            });
        }

        function liberarModoAdminVisual() {
            database.ref('resultados_oficiais').once('value').then((snapshot) => {
                const oficiais = snapshot.val() || {};
                jogosBolao.forEach(jogo => {
                    const input1 = document.getElementById(`p1-${jogo.id}`);
                    const input2 = document.getElementById(`p2-${jogo.id}`);
                    input1.disabled = false;
                    input2.disabled = false;
                    input1.value = oficiais[`p1-${jogo.id}`] !== undefined ? oficiais[`p1-${jogo.id}`] : "";
                    input2.value = oficiais[`p2-${jogo.id}`] !== undefined ? oficiais[`p2-${jogo.id}`] : "";
                });
                
                document.getElementById("btn-cancelar-admin").classList.remove("hidden");
                const btnSalvar = document.getElementById("btn-salvar-palpites");
                btnSalvar.innerText = "Salvar Resultados Oficiais (Admin)";
                btnSalvar.className = "btn-alerta";
                
                const aviso = document.querySelector(".aviso-trava");
                aviso.innerText = "MODO ADMINISTRADOR ATIVO — INSIRA OS PLACARES REAIS";
                aviso.style.color = "#ff3d00";
            });
        }

        // LÓGICA DE TRAVA BASEADA NA DATA DO PRIMEIRO JOGO DO ARRAY (j01)
        function checarTravaDoSistema() {
            const dataPrimeiroJogo = new Date(jogosBolao[0].data);
            const trintaMinutosEmMs = 30 * 60 * 1000;
            const limiteTrava = new Date(dataPrimeiroJogo.getTime() - trintaMinutosEmMs);
            const agora = new Date();

            if (isAdmin) return; // Se for admin, ignora qualquer trava para poder pontuar

            document.getElementById("btn-cancelar-admin").classList.add("hidden");
            const btnSalvar = document.getElementById("btn-salvar-palpites");
            const aviso = document.querySelector(".aviso-trava");

            btnSalvar.className = "btn-sucesso";
            btnSalvar.innerText = "Salvar Todos os Palpites";

            if (agora >= limiteTrava) {
                document.querySelectorAll(".placar-inputs input").forEach(input => input.disabled = true);
                btnSalvar.classList.add("hidden");
                aviso.innerText = "SISTEMA TRAVADO! Os palpites para esta rodada foram encerrados.";
                aviso.style.color = "#ff3d00";
            } else {
                document.querySelectorAll(".placar-inputs input").forEach(input => input.disabled = false);
                btnSalvar.classList.remove("hidden");
                
                const minutosRestantes = Math.ceil((limiteTrava - agora) / (1000 * 60));
                aviso.innerText = `Os palpites travam em ${minutosRestantes} minutos!`;
                aviso.style.color = "#ffb300";
            }
        }

        function salvarPalpitesUsuario() {
            let dadosPalpites = {};
            jogosBolao.forEach(jogo => {
                const val1 = document.getElementById(`p1-${jogo.id}`).value;
                const val2 = document.getElementById(`p2-${jogo.id}`).value;
                if(val1 !== "" && val2 !== "") {
                    dadosPalpites[`p1-${jogo.id}`] = parseInt(val1);
                    dadosPalpites[`p2-${jogo.id}`] = parseInt(val2);
                }
            });

            database.ref('participantes/' + meuNomeUsuario).update({
                nome: meuNomeUsuario,
                palpites: dadosPalpites
            }).then(() => {
                alert("Seus palpites foram salvos com sucesso no Firebase!");
            });
        }

        function salvarResultadosOficiaisAdmin() {
            let dadosOficiais = {};
            jogosBolao.forEach(jogo => {
                const val1 = document.getElementById(`p1-${jogo.id}`).value;
                const val2 = document.getElementById(`p2-${jogo.id}`).value;
                if(val1 !== "" && val2 !== "") {
                    dadosOficiais[`p1-${jogo.id}`] = parseInt(val1);
                    dadosOficiais[`p2-${jogo.id}`] = parseInt(val2);
                }
            });

            database.ref('resultados_oficiais').set(dadosOficiais).then(() => {
                recalcularPontuacoesGerais(dadosOficiais);
            });
        }

        function recalcularPontuacoesGerais(resultadosOficiais) {
            database.ref('participantes').once('value').then((snapshot) => {
                const participantes = snapshot.val() || {};
                
                Object.keys(participantes).forEach(key => {
                    const usuario = participantes[key];
                    const palpites = usuario.palpites || {};
                    let pontosTotal = 0;
                    let exatosTotal = 0;

                    jogosBolao.forEach(jogo => {
                        const res1 = resultadosOficiais[`p1-${jogo.id}`];
                        const res2 = resultadosOficiais[`p2-${jogo.id}`];
                        const pal1 = palpites[`p1-${jogo.id}`];
                        const pal2 = palpites[`p2-${jogo.id}`];

                        if (res1 !== undefined && res2 !== undefined && pal1 !== undefined && pal2 !== undefined) {
                            if (res1 === pal1 && res2 === pal2) {
                                pontosTotal += 5;   // Placar Exato
                                exatosTotal += 1;   
                            } else if ((res1 > res2 && pal1 > pal2) || (res1 < res2 && pal1 < pal2) || (res1 === res2 && pal1 === pal2)) {
                                pontosTotal += 3;   // Acertou Vencedor ou Empate
                            }
                        }
                    });

                    database.ref('participantes/' + key).update({
                        pontuacoes: pontosTotal,
                        exatos: exatosTotal
                    });
                });

                alert("Pontuações recalculadas com sucesso!");
                isAdmin = false;
                puxarMeusPalpitesDoFirebase();
                alternarAbas("palpites");
            });
        }

        function ouvirRankingDoFirebase() {
            database.ref('participantes').on('value', (snapshot) => {
                const participantes = snapshot.val() || {};
                let listaRanking = [];

                Object.keys(participantes).forEach(key => {
                    const u = participantes[key];
                    listaRanking.push({
                        nome: u.nome,
                        pontos: u.pontuacoes || 0,
                        exatos: u.exatos || 0
                    });
                });

                listaRanking.sort((a, b) => {
                    if (b.pontos !== a.pontos) {
                        return b.pontos - a.pontos;
                    }
                    return b.exatos - a.exatos;
                });

                const containerRanking = document.getElementById("lista-ranking");
                containerRanking.innerHTML = `
                    <div class="linha-ranking cabecalho-ranking">
                        <span>Posição / Nome</span>
                        <span>Pontos (Exatos)</span>
                    </div>
                `;

                listaRanking.forEach((usuario, index) => {
                    containerRanking.innerHTML += `
                        <div class="linha-ranking">
                            <span>${index + 1}º ${usuario.nome}</span>
                            <span>${usuario.pontos} pts (${usuario.exatos})</span>
                        </div>
                    `;
                });
            });
        }

        function alternarAbas(aba) {
            if (aba === "palpites") {
                document.getElementById("tab-palpites").classList.add("active");
                document.getElementById("tab-ranking").classList.remove("active");
                document.getElementById("conteudo-palpites").classList.remove("hidden");
                document.getElementById("conteudo-ranking").classList.add("hidden");
            } else {
                document.getElementById("tab-palpites").classList.remove("active");
                document.getElementById("tab-ranking").classList.add("active");
                document.getElementById("conteudo-palpites").classList.add("hidden");
                document.getElementById("conteudo-ranking").classList.remove("hidden");
            }
        }
    </script>
</body>
</html>
