<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v14.0 - PAINEL MASTER LIBERADO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding-bottom: 100px; }
        .card { background: var(--card); padding: 30px; border-radius: 25px; border-top: 6px solid var(--primary); box-shadow: 0 20px 60px rgba(0,0,0,0.9); text-align: center; margin-top: 20px; }
        
        h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 900; }
        h1 span { color: var(--accent); }

        #barra-status { font-size: 12px; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-weight: 900; text-transform: uppercase; border: 1px solid #333; }
        .aberto { background: rgba(0, 255, 136, 0.1); color: var(--primary); border-color: var(--primary); }
        .fechado { background: rgba(255, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

        /* JOGOS */
        .jogo-card { background: #222; border-radius: 18px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; border-left: 6px solid var(--accent); }
        .time-info { width: 35%; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .placar-box { width: 55px; height: 50px; background: #333; border: 2px solid #444; color: #fff; border-radius: 12px; text-align: center; font-size: 26px; font-weight: bold; }

        /* UI */
        .hidden { display: none !important; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin: 12px 0; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-gray { background: #333; color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        /* BOTAO MASTER NO RODAPÉ */
        .btn-master-fixo { position: fixed; bottom: 20px; width: 90%; max-width: 460px; background: rgba(30,30,30,0.9); border: 1px solid var(--primary); color: var(--primary); padding: 12px; font-size: 11px; border-radius: 12px; z-index: 100; font-weight: bold; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-body { background: var(--card); padding: 35px; border-radius: 30px; border: 2px solid var(--accent); width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>MAU<span>BET</span></h1>
        <div id="barra-status" class="aberto">SISTEMA ONLINE</div>

        <div id="tela-login">
            <p style="color: #888;">Acesse com seu número para apostar:</p>
            <input type="text" id="input-nome" placeholder="NOME COMPLETO">
            <input type="tel" id="input-tel" placeholder="DDD + CELULAR">
            <div id="recaptcha-container"></div>
            <button class="btn-green" onclick="enviarSMS()">RECEBER CÓDIGO SMS</button>
        </div>

        <div id="tela-codigo" class="hidden">
            <p>Digite o código de 6 dígitos:</p>
            <input type="number" id="input-confirm" placeholder="000000">
            <button class="btn-green" onclick="validarEntrada()">ENTRAR NO BOLÃO</button>
            <button class="btn-gray" onclick="location.reload()">VOLTAR</button>
        </div>

        <div id="tela-jogos" class="hidden">
            <div id="lista-jogos"></div>
            <button id="btn-finalizar" class="btn-green" onclick="abrirModal()">🔒 FINALIZAR BILHETE</button>
        </div>

        <div id="tela-mestre-senha" class="hidden">
            <h3 style="color:var(--primary)">ACESSO RESTRITO</h3>
            <p>Digite a Senha Master para gerenciar:</p>
            <input type="password" id="pass-admin" placeholder="SENHA MASTER">
            <button class="btn-green" onclick="entrarPainel()">LIBERAR PAINEL</button>
            <button class="btn-gray" onclick="location.reload()">CANCELAR</button>
        </div>

        <div id="tela-painel-admin" class="hidden">
            <h2 style="color:var(--accent)">PAINEL DO MESTRE</h2>
            
            <div style="background: #111; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #222;">
                <p style="color:var(--primary); font-weight:bold; margin-top:0;">ADICIONAR JOGOS DA RODADA</p>
                <input type="text" id="add-casa" placeholder="TIME CASA">
                <p style="margin:0; color:var(--accent)">X</p>
                <input type="text" id="add-fora" placeholder="TIME FORA">
                <button class="btn-green" onclick="cadastrarJogoNoBanco()">➕ ADICIONAR JOGO</button>
                <button class="btn-danger" style="margin-top:15px; font-size:11px;" onclick="limparTodaRodada()">🗑️ APAGAR RODADA ATUAL</button>
            </div>

            <div style="background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222;">
                <p style="color:var(--primary); font-weight:bold; margin-top:0;">FECHAMENTO AUTOMÁTICO</p>
                <input type="time" id="config-horario">
                <button class="btn-green" onclick="salvarTrava()">SALVAR HORÁRIO</button>
            </div>

            <button class="btn-gray" style="margin-top:30px;" onclick="location.reload()">SAIR DO PAINEL</button>
        </div>
    </div>
</div>

<button class="btn-master-fixo" onclick="mostrarLoginMestre()">⚙️ ACESSAR PAINEL MASTER</button>

<div id="modal-confirma" class="overlay">
    <div class="modal-body">
        <h3>CONFIRMAR ENVIO?</h3>
        <button class="btn-green" onclick="salvarAposta()">ENVIAR AGORA!</button>
        <button class="btn-gray" onclick="fecharModal()">VOLTAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", 
        authDomain: "bolao-d2baf.firebaseapp.com", 
        projectId: "bolao-d2baf", 
        storageBucket: "bolao-d2baf.firebasestorage.app", 
        messagingSenderId: "955171998764", 
        appId: "1:955171998764:web:2ccf8f2b6f23c300755589" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let resSMS, hLim = "", nUser = "", tUser = "";

    // TRAVA DE HORÁRIO
    function checarRelogio() {
        if(!hLim) return;
        const agora = new Date();
        const atual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const st = document.getElementById('barra-status');
        if(atual >= hLim) {
            st.innerText = "🚨 ENCERRADO ÀS " + hLim; st.className = "fechado";
            document.getElementById('btn-finalizar')?.classList.add('hidden');
        } else {
            st.innerText = "⏳ ABERTO ATÉ " + hLim; st.className = "aberto";
        }
    }
    setInterval(checarRelogio, 5000);
    db.collection("config").doc("rodada").onSnapshot(doc => { if(doc.exists) { hLim = doc.data().limite; checarRelogio(); } });

    // SMS
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    function enviarSMS() {
        nUser = document.getElementById('input-nome').value;
        tUser = document.getElementById('input-tel').value.replace(/\D/g, '');
        if(nUser.length < 3 || tUser.length < 10) return alert("Preencha Nome e Telefone corretamente!");
        auth.signInWithPhoneNumber("+55" + tUser, window.recaptchaVerifier).then(res => {
            resSMS = res;
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-codigo').classList.remove('hidden');
            alert("Código enviado!");
        }).catch(e => alert("Erro SMS: " + e.message));
    }
    function validarEntrada() {
        const c = document.getElementById('input-confirm').value;
        resSMS.confirm(c).then(() => {
            document.getElementById('tela-codigo').classList.add('hidden');
            document.getElementById('tela-jogos').classList.remove('hidden');
            carregarLista();
        }).catch(() => alert("Código inválido!"));
    }

    // LISTAGEM DE JOGOS
    function carregarLista() {
        const div = document.getElementById('lista-jogos');
        db.collection("jogos").onSnapshot(snap => {
            div.innerHTML = "";
            if(snap.empty) { div.innerHTML = "<p style='color:orange;'>Aguardando o mestre cadastrar os jogos...</p>"; return; }
            snap.forEach(doc => {
                const j = doc.data();
                div.innerHTML += `<div class="jogo-card"><div class="time-info">${j.home}</div><div><input type="number" class="placar-box" id="${doc.id}-h"> x <input type="number" class="placar-box" id="${doc.id}-a"></div><div class="time-info">${j.away}</div></div>`;
            });
        });
    }

    // FUNÇÕES MASTER (O CORAÇÃO DO SISTEMA)
    function mostrarLoginMestre() { 
        document.getElementById('tela-login').classList.add('hidden'); 
        document.getElementById('tela-jogos').classList.add('hidden');
        document.getElementById('tela-mestre-senha').classList.remove('hidden'); 
    }

    function entrarPainel() { 
        const senha = document.getElementById('pass-admin').value;
        if(senha === "2026") { 
            // ESCONDE TUDO E MOSTRA O PAINEL
            document.getElementById('tela-mestre-senha').classList.add('hidden'); 
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-jogos').classList.add('hidden');
            document.getElementById('tela-painel-admin').classList.remove('hidden'); 
            alert("Acesso Master Concedido!");
        } else { 
            alert("Senha Incorreta!"); 
        } 
    }
    
    async function cadastrarJogoNoBanco() {
        const casa = document.getElementById('add-casa').value;
        const fora = document.getElementById('add-fora').value;
        if(!casa || !fora) return alert("Preencha os dois times!");
        await db.collection("jogos").add({ home: casa, away: fora });
        document.getElementById('add-casa').value = ""; document.getElementById('add-fora').value = "";
        alert("Jogo Adicionado com Sucesso!");
    }

    async function limparTodaRodada() {
        if(!confirm("Cuidado! Isso vai apagar todos os jogos atuais. Continuar?")) return;
        const snap = await db.collection("jogos").get();
        const batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("Rodada Limpa!");
    }

    async function salvarTrava() {
        const h = document.getElementById('config-horario').value;
        await db.collection("config").doc("rodada").set({ limite: h });
        alert("Horário de Fechamento Gravado!");
    }

    function abrirModal() { document.getElementById('modal
