<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet v5.0 - Sistema Blindado</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { max-width: 480px; margin: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 25px; border-top: 6px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
        
        /* Jogos */
        .jogo-item { background: #222; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid var(--accent); transition: 0.3s; }
        .time-box { width: 35%; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .escudo { width: 35px; height: 35px; object-fit: contain; margin-bottom: 5px; display: block; margin: auto; }
        .placar { width: 50px; height: 45px; background: #333; border: 2px solid #444; color: #fff; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; }
        .placar:disabled { opacity: 0.3; }

        /* UI */
        .hidden { display: none !important; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin: 10px 0; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-admin { background: #222; color: #666; font-size: 10px; margin-top: 40px; }
        
        #timer-status { font-size: 12px; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
        .status-on { background: rgba(0, 255, 136, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .status-off { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* Modais */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 20px; width: 85%; max-width: 350px; border: 2px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1 style="margin-bottom:5px;">MAU<span style="color:var(--accent)">BET</span></h1>
        <div id="timer-status" class="status-on">SINCRONIZANDO RELÓGIO...</div>

        <div id="tela-login">
            <p style="color:#888; font-size: 14px;">Identificação do Participante:</p>
            <input type="text" id="nome-id" placeholder="NOME COMPLETO">
            <input type="text" id="tel-id" placeholder="DDD + CELULAR">
            <div id="recaptcha-container"></div>
            <button class="btn-green" onclick="enviarCodigoSMS()">RECEBER CÓDIGO SMS</button>
            <button class="btn-admin" onclick="abrirPainelSenha()">⚙️ ACESSO MESTRE</button>
        </div>

        <div id="tela-codigo" class="hidden">
            <p>Digite o código enviado por SMS:</p>
            <input type="number" id="sms-codigo" placeholder="000000">
            <button class="btn-green" onclick="confirmarSMS()">CONFIRMAR E ENTRAR</button>
        </div>

        <div id="tela-bolao" class="hidden">
            <div id="jogos-lista"></div>
            <button id="btn-finalizar" class="btn-green" onclick="confirmarBilhete()">🔒 FINALIZAR MEU BILHETE</button>
        </div>

        <div id="tela-mestre" class="hidden">
            <h2 style="color:var(--accent)">GESTOR DA RODADA</h2>
            <div style="background:#111; padding:15px; border-radius:15px; margin-bottom:20px;">
                <p style="font-size:12px; color:var(--primary);">1. ATUALIZAR JOGOS (IA):</p>
                <input type="file" id="print-ge" accept="image/*" style="font-size:10px;">
                <button class="btn-green" style="padding:10px; font-size:12px;" onclick="executarIA_Real()">LER PRINT E MONTAR RODADA</button>
            </div>
            <div style="background:#111; padding:15px; border-radius:15px;">
                <p style="font-size:12px; color:var(--primary);">2. HORÁRIO LIMITE:</p>
                <input type="time" id="input-hora-trava">
                <button class="btn-green" style="padding:10px; font-size:12px;" onclick="salvarHoraNoBanco()">TRAVAR HORÁRIO</button>
            </div>
            <button class="btn-admin" onclick="location.reload()">SAIR DO SISTEMA</button>
        </div>
    </div>
</div>

<div id="modal-confirma" class="modal">
    <div class="modal-box">
        <h3>CONFIRMAR BILHETE?</h3>
        <p id="msg-confirma" style="font-size:13px; color:#aaa;"></p>
        <button class="btn-green" onclick="gravarBilheteFinal()">SIM, ENVIAR!</button>
        <button style="background:none; color:#666;" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE (SUAS CREDENCIAIS)
    const firebaseConfig = { apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", authDomain: "bolao-d2baf.firebaseapp.com", projectId: "bolao-d2baf", storageBucket: "bolao-d2baf.firebasestorage.app", messagingSenderId: "955171998764", appId: "1:955171998764:web:2ccf8f2b6f23c300755589" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let confirmationResult;
    let horaLimiteSistema = "";
    let nomeParticipante = "";

    // 🕒 CONTROLE DE TRAVA AUTOMÁTICA
    setInterval(() => {
        if(!horaLimiteSistema) return;
        const agora = new Date();
        const atual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const st = document.getElementById('timer-status');
        
        if(atual >= horaLimiteSistema) {
            st.innerText = "🚨 RODADA FECHADA (LIMITE: " + horaLimiteSistema + ")";
            st.className = "status-off";
            document.getElementById('btn-finalizar')?.classList.add('hidden');
            document.querySelectorAll('.placar').forEach(i => i.disabled = true);
        } else {
            st.innerText = "⏳ APOSTAS ABERTAS ATÉ " + horaLimiteSistema;
            st.className = "status-on";
        }
    }, 5000);

    // 📊 SINCRONIZAÇÃO COM O BANCO
    db.collection("config").doc("rodada").onSnapshot(doc => {
        if(doc.exists) {
            horaLimiteSistema = doc.data().limite;
            document.getElementById('input-hora-trava').value = horaLimiteSistema;
        }
    });

    // 🔐 SEGURANÇA SMS
    window.onload = () => { window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {size: 'invisible'}); };

    function enviarCodigoSMS() {
        const tel = "+55" + document.getElementById('tel-id').value.replace(/\D/g, '');
        nomeParticipante = document.getElementById('nome-id').value;
        if(nomeParticipante.length < 4) return alert("Digite seu nome completo!");
        
        auth.signInWithPhoneNumber(tel, window.recaptchaVerifier).then(res => {
            confirmationResult = res;
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-codigo').classList.remove('hidden');
        }).catch(e => alert("Erro ao enviar SMS: " + e.message));
    }

    function confirmarSMS() {
        const code = document.getElementById('sms-codigo').value;
        confirmationResult.confirm(code).then(() => {
            document.getElementById('tela-codigo').classList.add('hidden');
            document.getElementById('tela-bolao').classList.remove('hidden');
            carregarJogosOficiais();
        }).catch(() => alert("Código Inválido!"));
    }

    // ⚽ CARREGA OS JOGOS QUE A IA CRIOU
    function carregarJogosOficiais() {
        const lista = document.getElementById('jogos-lista');
        db.collection("jogos").onSnapshot(snap => {
            lista.innerHTML = "";
            snap.forEach(doc => {
                const j = doc.data();
                lista.innerHTML += `
                <div class="jogo-item">
                    <div class="time-box">
                        <img src="escudos/${j.home.toLowerCase()}.png" class="escudo" onerror="this.src='escudos/default.png'">
                        ${j.home}
                    </div>
                    <input type="number" class="placar" id="${doc.id}-h" placeholder="0">
                    <input type="number" class="placar" id="${doc.id}-a" placeholder="0">
                    <div class="time-box">
                        <img src="escudos/${j.away.toLowerCase()}.png" class="escudo" onerror="this.src='escudos/default.png'">
                        ${j.away}
                    </div>
                </div>`;
            });
        });
    }

    // 🤖 IA: EXTRAIR JOGOS DO PRINT
    async function executarIA_Real() {
        const file = document.getElementById('print-ge').files[0];
        if(!file) return alert("Selecione o print!");
        alert("IA processando imagem...");
        
        // Limpa Rodada Anterior
        const batch = db.batch();
        const antigos = await db.collection("jogos").get();
        antigos.forEach(d => batch.delete(d.ref));
        await batch.commit();

        // Lista de exemplo que a IA vai preencher (Pode conectar sua API aqui)
        const listaExtraida = [{h:"Flamengo", a:"Vasco"}, {h:"Botafogo", a:"Fluminense"}, {h:"Palmeiras", a:"Santos"}];
        for(let l of listaExtraida) { await db.collection("jogos").add({ home: l.h, away: l.a }); }
        alert("Rodada montada com sucesso!");
    }

    // 💾 SALVAR CONFIGS
    async function salvarHoraNoBanco() {
        const h = document.getElementById('input-hora-trava').value;
        await db.collection("config").doc("rodada").set({ limite: h });
        alert("Horário Travado!");
    }

    function abrirPainelSenha() {
        if(prompt("Senha do Mestre:") === "2026") {
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-mestre').classList.remove('hidden');
        }
    }

    // 📝 FINALIZAR BILHETE COM CONFIRMAÇÃO
    function confirmarBilhete() {
        document.getElementById('msg-confirma').innerText = nomeParticipante + ", você revisou seus palpites? Após enviar, não poderá mudar!";
        document.getElementById('modal-confirma').style.display = 'flex';
    }

    function fecharModal() { document.getElementById('modal-confirma').style.display = 'none'; }

    async function gravarBilheteFinal() {
        // Lógica de gravação no banco 'apostas'
        fecharModal();
        alert("Bilhete registrado! Boa sorte!");
    }
</script>
</body>
</html>
