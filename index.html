<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet - O Bolão do Mestre ⚽</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #00ff88; 
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --accent: #ffb300; 
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg-dark); color: #fff; text-align: center; padding: 20px; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 15px; border-top: 5px solid var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.5); max-width: 400px; margin: auto; }
        
        h1 { margin-bottom: 5px; font-weight: 900; letter-spacing: -1px; }
        .logo-mau { color: #fff; }
        .logo-bet { color: var(--accent); background: #333; padding: 2px 8px; border-radius: 5px; margin-left: 2px; }
        
        p { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input { width: 90%; padding: 14px; margin: 12px 0; border: 1px solid #333; border-radius: 8px; background: #2a2a2a; color: #fff; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: var(--primary); }
        
        button { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 95%; font-weight: 800; font-size: 16px; text-transform: uppercase; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        
        .btn-resend { background: transparent !important; color: var(--primary) !important; border: 1px solid var(--primary) !important; margin-top: 10px; }
        .btn-secondary { background: #333; color: #fff; margin-top: 10px; }
        
        .hidden { display: none; }
        #adminPanel { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-top: 20px; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1><span class="logo-mau">Bolão</span><span class="logo-bet">MauBet</span></h1>
    <p id="statusMsg">Plataforma Exclusiva de Apostas</p>

    <div id="loginArea">
        <input type="text" id="userName" placeholder="Seu Nome">
        <input type="text" id="userPhone" placeholder="Ex: 24 99314-8000">
        <div id="recaptcha-container"></div>
        <button onclick="enviarSMS()">RECEBER SMS</button>
    </div>

    <div id="otpArea" class="hidden">
        <p>Aguardando validação do código...</p>
        <h2 id="timer" style="color: var(--primary);">01:00</h2>
        <input type="number" id="otpCode" placeholder="000000">
        <button id="btnConfirmar" onclick="confirmarCodigo()">VALIDAR ACESSO</button>
        <button id="btnReenviar" class="btn-resend hidden" onclick="enviarSMS(true)">REENVIAR CÓDIGO</button>
    </div>

    <div id="mestreChoiceArea" class="hidden">
        <h3 id="welcomeMestre" style="color: var(--accent);">BEM-VINDO!</h3>
        <p>O que deseja fazer agora?</p>
        <button onclick="irParaAposta()" style="background: var(--accent);">FAZER MINHA APOSTA</button>
        <button onclick="exibirSenhaMaster()" class="btn-secondary">ABRIR PAINEL GESTOR</button>
        <button onclick="sair()" class="btn-resend" style="border:none !important; margin-top:20px;">Sair da conta</button>
    </div>

    <div id="masterPassArea" class="hidden">
        <h3 style="color: #ff5252;">🔐 SEGURANÇA MESTRE</h3>
        <input type="password" id="masterPass" placeholder="Senha Master">
        <button onclick="validarSenhaMaster()" style="background: #fff; color: #000;">DESBLOQUEAR PAINEL</button>
        <button onclick="voltarEscolha()" class="btn-resend" style="border:none !important;">Voltar</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h3 style="color: var(--primary);">🛠️ GESTÃO MAUBET</h3>
        <button onclick="alert('IA de leitura em breve!')" style="background: #00796b; color: white;">📸 LER PRINT DA RODADA</button>
        <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">
        <input type="datetime-local" id="lockTime">
        <button onclick="sair()" class="btn-secondary" style="font-size: 12px; width: 50%;">SAIR</button>
    </div>

    <div id="apostaArea" class="hidden">
        <h3 id="welcomeApostador" style="color: var(--primary);">MINHA APOSTA</h3>
        <div style="background: #2a2a2a; padding: 15px; border-radius: 10px; border: 1px dashed #444; margin-bottom: 20px;">
            <p>Aguardando liberação da rodada...</p>
        </div>
        <button onclick="sair()" class="btn-secondary">SAIR DA CONTA</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU",
      authDomain: "bolao-d2baf.firebaseapp.com",
      projectId: "bolao-d2baf",
      storageBucket: "bolao-d2baf.firebasestorage.app",
      messagingSenderId: "955171998764",
      appId: "1:955171998764:web:2ccf8f2b6f23c300755589"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let confirmationResult;
    let countdownInterval;
    let numeroSalvo = "";

    const MASTER_PHONE = "+5524981035118";
    const MASTER_PASS_SECRET = "931480";

    // --- LÓGICA DE RECONHECIMENTO AUTOMÁTICO ---
    window.onload = function() {
        const nomeSalvo = localStorage.getItem('maubet_nome');
        const telSalvo = localStorage.getItem('maubet_tel');
        if (nomeSalvo && telSalvo) {
            verificarAcesso(telSalvo, nomeSalvo);
        }
    };

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

    function enviarSMS(isResend = false) {
        let finalPhone = "";
        if (isResend) {
            finalPhone = numeroSalvo;
        } else {
            let phoneInput = document.getElementById('userPhone').value.trim();
            let cleaned = phoneInput.replace(/\D/g, ''); 
            if (cleaned.length === 11) cleaned = '55' + cleaned;
            finalPhone = '+' + cleaned;
            numeroSalvo = finalPhone;
        }

        auth.signInWithPhoneNumber(finalPhone, window.recaptchaVerifier)
            .then((result) => {
                confirmationResult = result;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('otpArea').classList.remove('hidden');
                document.getElementById('btnConfirmar').classList.remove('hidden');
                document.getElementById('btnReenviar').classList.add('hidden');
                document.getElementById('statusMsg').innerText = "Verifique seu SMS";
                startTimer();
            }).catch((err) => {
                alert("Erro ao enviar. Tente novamente.");
            });
    }

    function startTimer() {
        clearInterval(countdownInterval);
        let time = 60;
        const timerElem = document.getElementById('timer');
        countdownInterval = setInterval(() => {
            time--;
            timerElem.innerText = `00:${time < 10 ? '0' : ''}${time}`;
            if(time <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('btnConfirmar').classList.add('hidden');
                document.getElementById('btnReenviar').classList.remove('hidden');
            }
        }, 1000);
    }

    function confirmarCodigo() {
        const code = document.getElementById('otpCode').value;
        const nomeParaSalvar = document.getElementById('userName').value;
        confirmationResult.confirm(code).then((result) => {
            verificarAcesso(result.user.phoneNumber, nomeParaSalvar);
        }).catch(() => alert("Código inválido!"));
    }

    function verificarAcesso(phone, nomeManual) {
        // Salva na memória do celular
        localStorage.setItem('maubet_nome', nomeManual);
        localStorage.setItem('maubet_tel', phone);

        // Lógica de Saudação
        const hora = new Date().getHours();
        let saudacao = "Bom dia";
        if (hora >= 12 && hora < 18) saudacao = "Boa tarde";
        if (hora >= 18) saudacao = "Boa noite";

        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('otpArea').classList.add('hidden');
        document.getElementById('statusMsg').innerText = `${saudacao}, ${nomeManual}!`;

        if(phone === MASTER_PHONE) {
            document.getElementById('mestreChoiceArea').classList.remove('hidden');
        } else {
            irParaAposta();
        }
    }

    function irParaAposta() {
        document.getElementById('mestreChoiceArea').classList.add('hidden');
        document.getElementById('apostaArea').classList.remove('hidden');
    }

    function exibirSenhaMaster() {
        document.getElementById('mestreChoiceArea').classList.add('hidden');
        document.getElementById('masterPassArea').classList.remove('hidden');
    }

    function voltarEscolha() {
        document.getElementById('masterPassArea').classList.add('hidden');
        document.getElementById('mestreChoiceArea').classList.remove('hidden');
    }

    function sair() {
        localStorage.clear();
        location.reload();
    }

    function validarSenhaMaster() {
        if(document.getElementById('masterPass').value === MASTER_PASS_SECRET) {
            document.getElementById('masterPassArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "MODO GESTOR ATIVO";
        } else {
            alert("Senha incorreta!");
        }
    }
</script>
</body>
</html>
