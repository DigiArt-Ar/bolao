<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v37.2 - VOLTA TELEFONE</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --text: #ffffff; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); margin-top: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; padding: 5px 8px; font-size: 12px; width: auto; margin: 0; border-radius: 8px; }
        .jogo-item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .time-box { width: 30%; font-size: 10px; font-weight: bold; text-align: center; }
        .escudo { width: 35px; height: 35px; object-fit: contain; display: block; margin: 0 auto 5px; }
        .placar-input { width: 42px; height: 42px; background: #000; border: 1px solid var(--primary); color: #fff; text-align: center; font-size: 18px; font-weight: bold; border-radius: 8px; }
        .mestre-linha { display: flex; align-items: center; justify-content: space-between; background: #111; padding: 8px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #333; }
    </style>
</head>
<body>
<div class="container">
    <div id="msg-boas-vindas" style="color:var(--primary); font-weight:bold; text-align:center; margin-bottom:10px"></div>
    <div class="card">
        <div id="view-login">
            <h2>MAU<span>BET</span></h2>
            <input type="text" id="user-nome" placeholder="NOME COMPLETO">
            <input type="tel" id="user-tel" placeholder="TELEFONE (WHATSAPP)">
            <button class="btn-green" onclick="handleAcesso()">ENTRAR NO BOLÃO</button>
            
            <div id="login-mestre" class="hidden">
                <input type="password" id="pass-mestre" placeholder="SENHA MASTER">
                <button class="btn-accent" onclick="acessoMestre()">LIBERAR PAINEL</button>
            </div>
            <span style="color:#222; font-size:9px; cursor:pointer; display:block; margin-top:25px" onclick="document.getElementById('login-mestre').classList.toggle('hidden')">v37.2</span>
        </div>

        <div id="view-main" class="hidden">
            <div id="bloco-mestre" class="hidden" style="background:#000; padding:15px; border-radius:15px; border:1px dashed var(--accent); margin-bottom:20px; text-align:left">
                <b style="color:var(--accent)">1. ADICIONAR JOGO:</b>
                <input type="text" id="input-casa" placeholder="TIME CASA">
                <input type="text" id="input-fora" placeholder="TIME FORA">
                <input type="datetime-local" id="input-data">
                <button class="btn-accent" onclick="addJogoNovo()">+ SALVAR TIME</button>
                <button id="btn-toggle-rodada" class="btn-green" onclick="toggleRodada(true)">🚀 LIBERAR PARA TODOS</button>
                
                <hr style="border-color:#333; margin:15px 0">
                <b style="color:var(--primary)">2. RESULTADOS E GESTÃO:</b>
                <div id="lista-mestre-resultados" style="margin-top:10px"></div>
            </div>

            <div id="status-msg" style="padding: 20px; color: #888;" class="hidden">A rodada está sendo preparada. Aguarde a liberação do Mestre!</div>
            <div id="display-jogos"></div>
            <button id="btn-salvar-jogo" class="hidden btn-green" onclick="salvarPalpites()">🔒 ENVIAR MEU BILHETE</button>
            
            <div id="ranking-container" class="ranking-box hidden">
                <h3 style="color:var(--accent); margin:0 0 10px 0">🏆 RANKING</h3>
                <div id="ranking-lista"></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#444; font-size:10px; border:none; margin-top:30px">SAIR / TROCAR CONTA</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", 
        authDomain: "bolao-d2baf.firebaseapp.com", 
        projectId: "bolao-d2baf", 
        storageBucket: "bolao-d2baf.firebasestorage.app", 
        messagingSenderId: "955171998764", 
        appId: "1:955171998764:web:2ccf8f2b6f23c300755589" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const MASTER_KEY = "259225";

    window.onload = () => { if(localStorage.getItem('maubet_token')) startApp(); };

    function handleAcesso() {
        const n = document.getElementById('user-nome').value.toUpperCase().trim();
        const t = document.getElementById('user-tel').value.trim();
        if(!n || !t) return alert("Preencha nome e telefone!");
        localStorage.setItem('maubet_n', n);
        localStorage.setItem('maubet_token', 'user');
        startApp();
    }

    function acessoMestre() {
        if(document.getElementById('pass-mestre').value === MASTER_KEY) {
            localStorage.setItem('maubet_n', "MESTRE MAU");
            localStorage.setItem('maubet_token', 'admin');
            startApp();
        } else {
            alert("Senha incorreta!");
        }
    }

    function startApp() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
        document.getElementById('msg-boas-vindas').innerText = "Olá, " + localStorage.getItem('maubet_n');
        
        db.collection("config").doc("status").onSnapshot(doc => {
            const liberada = doc.exists ? doc.data().liberada : false;
            const admin = localStorage.getItem('maubet_token') === 'admin';
            
            if(admin) {
                document.getElementById('bloco-mestre').classList.remove('hidden');
                const btn = document.getElementById('btn-toggle-rodada');
                btn.innerText = liberada ? "🔒 TRAVAR RODADA" : "🚀 LIBERAR PARA TODOS";
                btn.className = liberada ? "btn-accent" : "btn-green";
                btn.onclick = () => toggleRodada(!liberada);
            }

            if(!liberada && !admin) {
                document.getElementById('status-msg').classList.remove('hidden');
                document.getElementById('display-jogos').innerHTML = "";
            } else {
                document.getElementById('status-msg').classList.add('hidden');
                renderConteudo(admin);
            }
        });
    }

    async function toggleRodada(v) { 
        await db.collection("config").doc("status").set({ liberada: v });
        alert(v ? "RODADA ABERTA!" : "RODADA FECHADA!");
    }

    async function addJogoNovo() {
        const c = document.getElementById('input-casa').value.toUpperCase().trim();
        const f = document.getElementById('input-fora').value.toUpperCase().trim();
        const d = document.getElementById('input-data').value;
        if(c && f && d) {
            await db.collection("jogos").add({ home: c, away: f, inicio: d, resH: null, resF: null, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            document.getElementById('input-casa').value = ""; 
            document.getElementById('input-fora').value = "";
            alert("Jogo adicionado!");
        }
    }

    async function excluirJogo(id) {
        if(confirm("Excluir este jogo?")) await db.collection("jogos").doc(id).delete();
    }

    function renderConteudo(admin) {
        db.collection("jogos").orderBy("timestamp", "asc").onSnapshot(snap => {
            const container = document.getElementById('display-jogos');
            const listaMestre = document.getElementById('lista-mestre-resultados');
            container.innerHTML = ""; listaMestre.innerHTML = "";
            let jogosFinais = {};

            snap.forEach(doc => {
                const d = doc.data(); const id = doc.id;
                if(d.resH !== null) jogosFinais[id] = {h: d.resH, f: d.resF};
                const hI = d.home.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
                const aI = d.away.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');

                container.innerHTML += `
                    <div class="jogo-item">
                        <div class="time-box"><img src="escudos/${hI}.png" class="escudo" onerror="this.src='escudos/default.png'">${d.home}</div>
                        <div>
                            <div style="display:flex; gap:5px">
                                <input type="number" class="placar-input user-p" id="p-${id}-h" oninput="checkInputs()" ${d.resH !== null ? 'disabled' : ''}>
                                <input type="number" class="placar-input user-p" id="p-${id}-f" oninput="checkInputs()" ${d.resH !== null ? 'disabled' : ''}>
                            </div>
                        </div>
                        <div class="time-box"><img src="escudos/${aI}.png" class="escudo" onerror="this.src='escudos/default.png'">${d.away}</div>
                    </div>`;

                if(admin) {
                    listaMestre.innerHTML += `
                        <div class="mestre-linha">
                            <span style="font-size:9px; width:50px">${d.home}</span>
                            <input type="number" id="m-${id}-h" style="width:30px; height:30px; background:#222; color:#fff" value="${d.resH !== null ? d.resH : ''}">
                            <input type="number" id="m-${id}-f" style="width:30px; height:30px; background:#222; color:#fff" value="${d.resF !== null ? d.resF : ''}">
                            <button onclick="salvarPlacarFinal('${id}')" class="btn-green" style="width:auto; padding:5px; margin:0">OK</button>
                            <button onclick="excluirJogo('${id}')" class="btn-danger">🗑️</button>
                        </div>`;
                }
            });
            if(Object.keys(jogosFinais).length > 0) atualizarRanking(jogosFinais);
        });
    }

    async function salvarPlacarFinal(id) {
        const h = document.getElementById(`m-${id}-h`).value;
        const f = document.getElementById(`m-${id}-f`).value;
        if(h !== "" && f !== "") {
            await db.collection("jogos").doc(id).update({ resH: parseInt(h), resF: parseInt(f) });
            alert("Salvo!");
        }
    }

    function checkInputs() {
        const inputs = document.querySelectorAll('.user-p:not([disabled])');
        const preenchido = Array.from(inputs).every(i => i.value !== "");
        document.getElementById('btn-salvar-jogo').classList.toggle('hidden', !preenchido || inputs.length === 0);
    }

    async function salvarPalpites() {
        const p = {}; document.querySelectorAll('.user-p').forEach(i => p[i.id] = i.value);
        await db.collection("apostas").add({ nome: localStorage.getItem('maubet_n'), palpites: p, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("BILHETE ENVIADO!");
        location.reload();
    }

    async function atualizarRanking(jogosFinais) {
        const snap = await db.collection("apostas").get();
        let rank = [];
        snap.forEach(doc => {
            const a = doc.data(); let pts = 0;
            for(let jId in jogosFinais) {
                const rH = jogosFinais[jId].h; const rF = jogosFinais[jId].f;
                const pH = parseInt(a.palpites[`p-${jId}-h`]); const pF = parseInt(a.palpites[`p-${jId}-f`]);
                if(!isNaN(pH) && !isNaN(pF)) {
                    if(pH === rH && pF === rF) pts += 10;
                    else if((rH > rF && pH > pF) || (rF > rH && pF > pH) || (rH === rF && pH === pF)) pts += 6;
                }
            }
            rank.push({n: a.nome, p: pts});
        });
        rank.sort((a,b) => b.p - a.p);
        const list = document.getElementById('ranking-lista'); list.innerHTML = "";
        rank.forEach((r, i) => { list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222"><span>${i+1}º ${r.n}</span> <b>${r.p} pts</b></div>`; });
        document.getElementById('ranking-container').classList.remove('hidden');
    }
</script>
</body>
</html>
