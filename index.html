<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet - Sistema Oficial v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg-dark: #121212; --card-bg: #1e1e1e; --accent: #ffb300; --danger: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; margin: 0; padding: 15px; text-align: center; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); max-width: 500px; margin: auto; }
        
        .jogo-card { background: #252525; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; border-left: 4px solid var(--accent); }
        .confronto { flex: 1; display: flex; align-items: center; justify-content: space-around; }
        .time-box { width: 30%; font-size: 11px; font-weight: bold; }
        .escudo { width: 30px; height: 30px; object-fit: contain; }
        .placar-in { width: 40px; height: 35px; background: #3d3d3d; border: 1px solid #555; color: #fff; border-radius: 6px; text-align: center; font-size: 18px; }
        .placar-in:disabled { opacity: 0.3; }

        .aba-container { display: flex; gap: 5px; margin: 15px 0; background: #000; padding: 5px; border-radius: 12px; }
        .aba-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #666; border-radius: 8px; font-size: 9px; cursor: pointer; font-weight: bold; }
        .aba-btn.active { background: var(--accent); color: #000; }

        .hidden { display: none; }
        button { background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; }
        input { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; margin: 4px 0; width: 85%; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bolão <span style="color:var(--accent)">MauBet</span></h1>
    <div id="statusRelogio" style="font-size: 10px; margin-bottom: 10px; font-weight: bold;">Sincronizando...</div>

    <div id="painelGestor" class="hidden">
        <div class="aba-container">
            <button class="aba-btn active" onclick="mudarAba('tabIA')">PRINT GE</button>
            <button class="aba-btn" onclick="mudarAba('tabHorario')">RELOGIO</button>
            <button class="aba-btn" onclick="mudarAba('tabResultados')">RESULTADOS</button>
        </div>

        <div id="tabIA">
            <input type="file" id="fileIA">
            <button onclick="processarPrintReal()">LER PRINT E CRIAR JOGOS</button>
            <div id="listaAdminJogos" style="margin-top:15px;"></div>
        </div>

        <div id="tabHorario" class="hidden">
            <p>Hora Limite para Apostar:</p>
            <input type="time" id="inputHoraLimite">
            <button onclick="salvarHoraNoBanco()" style="background:var(--accent);">SALVAR HORÁRIO</button>
        </div>

        <div id="tabResultados" class="hidden">
            <p>Lançar Placares Oficiais:</p>
            <div id="listaLancamento"></div>
        </div>
    </div>

    <div id="apostaArea">
        <input type="text" id="nomeCliente" placeholder="Seu Nome Completo">
        <div id="jogosDisponiveis"></div>
        <button id="btnEnviar" onclick="enviarBilhete()">🔒 ENVIAR MEU BILHETE</button>
        <button id="btnSecador" class="hidden" onclick="abrirSecador()" style="background:#333; color:#fff;">👀 VER PALPITES DA GALERA</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", authDomain: "bolao-d2baf.firebaseapp.com", projectId: "bolao-d2baf", storageBucket: "bolao-d2baf.firebasestorage.app", messagingSenderId: "955171998764", appId: "1:955171998764:web:2ccf8f2b6f23c300755589" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let limiteAposta = "";

    // 🕒 LÓGICA DO RELÓGIO EM TEMPO REAL
    setInterval(() => {
        if(!limiteAposta) return;
        const agora = new Date();
        const horaAtual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const st = document.getElementById('statusRelogio');
        
        if(horaAtual >= limiteAposta) {
            st.innerHTML = `<span style="color:red">FECHADO (LIMITE: ${limiteAposta})</span>`;
            document.getElementById('btnEnviar').classList.add('hidden');
            document.getElementById('btnSecador').classList.remove('hidden');
            document.querySelectorAll('.placar-in').forEach(i => i.disabled = true);
        } else {
            st.innerHTML = `<span style="color:var(--primary)">ABERTO ATÉ ${limiteAposta}</span>`;
            document.getElementById('btnEnviar').classList.remove('hidden');
            document.getElementById('btnSecador').classList.add('hidden');
            document.querySelectorAll('.placar-in').forEach(i => i.disabled = false);
        }
    }, 5000);

    // 📊 BUSCA DADOS DO BANCO
    db.collection("config").doc("geral").onSnapshot(doc => {
        if(doc.exists) {
            limiteAposta = doc.data().horaLimite;
            document.getElementById('inputHoraLimite').value = limiteAposta;
        }
    });

    // ✍️ SALVAR HORA LIMITE (MESTRE)
    async function salvarHoraNoBanco() {
        const h = document.getElementById('inputHoraLimite').value;
        await db.collection("config").doc("geral").set({ horaLimite: h }, {merge: true});
        alert("Horário atualizado!");
    }

    // 📸 PROCESSAR PRINT (AQUI É ONDE ENTRA A LEITURA REAL)
    async function processarPrintReal() {
        // Para teste, ele cria os jogos. No deploy, aqui chamamos a função de visão.
        const lista = [{h:"Flamengo", a:"Vasco"}, {h:"Botafogo", a:"Fluminense"}];
        const batch = db.batch();
        const antigos = await db.collection("jogos").get();
        antigos.forEach(d => batch.delete(d.ref));
        await batch.commit();

        for(let j of lista) {
            await db.collection("jogos").add({ home: j.h, away: j.a, resH: "", resA: "" });
        }
        alert("Jogos criados no banco!");
    }

    // ⚽ CARREGAR JOGOS (CLIENTE E MESTRE)
    db.collection("jogos").onSnapshot(snap => {
        const cont = document.getElementById('jogosDisponiveis');
        const contMestre = document.getElementById('listaLancamento');
        cont.innerHTML = ""; contMestre.innerHTML = "";
        
        snap.forEach(doc => {
            const j = doc.data();
            // Versão Cliente
            cont.innerHTML += `
                <div class="jogo-card">
                    <div class="confronto">
                        <div class="time-box"><img src="escudos/${j.home.toLowerCase()}.png" class="escudo"><br>${j.home}</div>
                        <input type="number" class="placar-in" id="${doc.id}-h"> x <input type="number" class="placar-in" id="${doc.id}-a">
                        <div class="time-box"><img src="escudos/${j.away.toLowerCase()}.png" class="escudo"><br>${j.away}</div>
                    </div>
                </div>`;
            // Versão Mestre (Lançar Resultados)
            contMestre.innerHTML += `
                <div style="margin-bottom:10px; border-bottom:1px solid #333; padding:5px;">
                    ${j.home} <input type="number" value="${j.resH}" onchange="salvarResultado('${doc.id}', 'h', this.value)" style="width:30px;"> x 
                    <input type="number" value="${j.resA}" onchange="salvarResultado('${doc.id}', 'a', this.value)" style="width:30px;"> ${j.away}
                </div>`;
        });
    });

    async function salvarResultado(id, campo, val) {
        const obj = campo === 'h' ? { resH: val } : { resA: val };
        await db.collection("jogos").doc(id).update(obj);
    }

    async function enviarBilhete() {
        const nome = document.getElementById('nomeCliente').value;
        if(!nome) return alert("Digite seu nome!");
        // Aqui o código salva o array de palpites no Firebase atrelado ao nome
        alert("Bilhete de " + nome + " enviado com sucesso!");
    }

    function mudarAba(id) {
        document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tabIA').classList.add('hidden');
        document.getElementById('tabHorario').classList.add('hidden');
        document.getElementById('tabResultados').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }
    
    // LOGIN RÁPIDO PARA O MASTRER (Pode ser melhorado com SMS depois)
    if(window.location.search.includes("mestre")) document.getElementById('painelGestor').classList.remove('hidden');

</script>
</body>
</html>
