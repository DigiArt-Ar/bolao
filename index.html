<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiArt Bolão ⚽</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #004d40; color: #fff; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); max-width: 400px; margin: auto; }
        h1 { color: #e65100; margin-bottom: 5px; }
        p { margin-bottom: 20px; font-size: 14px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; text-align: center; }
        input:focus { border-color: #e65100; }
        button { background: #e65100; color: white; border: none; padding: 15px 20px; border-radius: 10px; cursor: pointer; width: 95%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #bf360c; }
        .btn-resend { background: #555 !important; margin-top: 10px; }
        .hidden { display: none; }
        #adminPanel { background: #fff3e0; border: 2px dashed #e65100; padding: 15px; border-radius: 15px; margin-top: 20px; color: #333; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>DigiArt Bolão ⚽</h1>
    <p id="statusMsg">Faça login para participar</p>

    <div id="loginArea">
        <input type="text" id="userName" placeholder="Seu Nome">
        <input type="text" id="userPhone" placeholder="Ex: 24 99314-8000">
        <div id="recaptcha-container"></div>
        <button onclick="enviarSMS()">RECEBER SMS</button>
    </div>

    <div id="otpArea" class="hidden">
        <p>Insira o código de 6 dígitos:</p>
        <h2 id="timer" style="color: #e65100;">01:00</h2>
        <input type="number" id="otpCode" placeholder="000000">
        <button id="btnConfirmar" onclick="confirmarCodigo()">ENTRAR</button>
        <button id="btnReenviar" class="btn-resend hidden" onclick="voltarParaLogin()">REENVIAR CÓDIGO</button>
    </div>

    <div id="masterPassArea" class="hidden">
        <h3 style="color: #d32f2f;">🔐 ACESSO RESTRITO</h3>
        <p>Maumau, digite sua senha:</p>
        <input type="password" id="masterPass" placeholder="Senha Master">
        <button onclick="validarSenhaMaster()" style="background: #333;">ABRIR PAINEL</button>
    </div>

    <div id="adminPanel" class="hidden">
        <h3>🛠️ GERENCIAR RODADA</h3>
        <button onclick="alert('IA de leitura em breve!')" style="background: #00796b;">📸 LER PRINT DA RODADA</button>
        <hr>
        <input type="datetime-local" id="lockTime">
        <button style="background: #c62828; margin-top: 10px;">🔴 REINICIAR BOLÃO</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU",
      authDomain: "bolao-d2baf.firebaseapp.com",
      projectId: "bolao-d2baf",
      storageBucket: "bolao-d2baf.firebasestorage.app",
      messagingSenderId: "955171998764",
      appId: "1:955171998764:web:2ccf8f2b6f23c300755589"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let confirmationResult;
    let countdownInterval;

    const MASTER_PHONE = "+5524981035118";
    const MASTER_PASS_SECRET = "931480";

    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });

    function enviarSMS() {
        let phoneInput = document.getElementById('userPhone').value.trim();
        let cleaned = phoneInput.replace(/\D/g, ''); 
        if (cleaned.length === 11) cleaned = '55' + cleaned;
        let finalPhone = '+' + cleaned;

        auth.signInWithPhoneNumber(finalPhone, window.recaptchaVerifier)
            .then((result) => {
                confirmationResult = result;
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('otpArea').classList.remove('hidden');
                document.getElementById('btnConfirmar').classList.remove('hidden');
                document.getElementById('btnReenviar').classList.add('hidden');
                document.getElementById('statusMsg').innerText = "Código enviado!";
                startTimer();
            }).catch((err) => {
                alert("Erro: Verifique o domínio no Firebase.");
                console.error(err);
            });
    }

    function startTimer() {
        clearInterval(countdownInterval);
        let time = 60;
        const timerElem = document.getElementById('timer');
        
        countdownInterval = setInterval(() => {
            time--;
            timerElem.innerText = `00:${time < 10 ? '0' : ''}${time}`;
            
            if(time <= 0) {
                clearInterval(countdownInterval);
                document.getElementById('btnConfirmar').classList.add('hidden');
                document.getElementById('btnReenviar').classList.remove('hidden');
                document.getElementById('statusMsg').innerText = "O tempo acabou!";
            }
        }, 1000);
    }

    function voltarParaLogin() {
        document.getElementById('otpArea').classList.add('hidden');
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('statusMsg').innerText = "Tente novamente.";
    }

    function confirmarCodigo() {
        const code = document.getElementById('otpCode').value;
        confirmationResult.confirm(code).then((result) => {
            verificarAcesso(result.user.phoneNumber);
        }).catch(() => alert("Código SMS inválido!"));
    }

    function verificarAcesso(phone) {
        if(phone === MASTER_PHONE) {
            document.getElementById('otpArea').classList.add('hidden');
            document.getElementById('masterPassArea').classList.remove('hidden');
        } else {
            alert("Acesso de apostador!");
        }
    }

    function validarSenhaMaster() {
        if(document.getElementById('masterPass').value === MASTER_PASS_SECRET) {
            document.getElementById('masterPassArea').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        } else {
            alert("Senha incorreta!");
        }
    }
</script>
</body>
</html>
