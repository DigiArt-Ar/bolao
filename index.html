<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v18.0 - SISTEMA OFICIAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --danger: #ff4444; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; padding-bottom: 100px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); box-shadow: 0 15px 40px rgba(0,0,0,0.6); text-align: center; margin-top: 10px; }
        h1 span { color: var(--accent); }
        
        .status-badge { font-size: 11px; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: 900; text-transform: uppercase; border: 1px solid #333; }
        .aberto { color: var(--primary); border-color: var(--primary); }
        .fechado { color: var(--danger); border-color: var(--danger); }

        .jogo-item { background: #222; border-radius: 15px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--accent); }
        .time-box { width: 32%; font-size: 10px; font-weight: bold; text-align: center; }
        .escudo { width: 35px; height: 35px; object-fit: contain; display: block; margin: 0 auto 5px; }
        .input-placar { width: 45px; height: 40px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; }

        .hidden { display: none !important; }
        input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; margin: 8px 0; box-sizing: border-box; text-align: center; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 8px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-dark { background: #333; color: #fff; }

        /* PAINEL GESTOR */
        .admin-row { background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; text-align: left; font-size: 12px; border: 1px solid #222; }
        .btn-check { width: auto; padding: 5px 10px; font-size: 10px; margin: 0; display: inline-block; }
        .pago { background: var(--primary) !important; color: #000; }
    </style>
</head>
