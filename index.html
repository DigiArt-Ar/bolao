<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v36.1 - CORREÇÃO TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --accent: #ffb300; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .hidden { display: none !important; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); margin-top: 10px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #000; }
        .jogo-item { background: #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #333; }
        .time-box { width: 30%; font-size: 10px; font-weight: bold; text-align: center; }
        .escudo { width: 40px; height: 40px; object-fit: contain; display: block; margin: 0 auto 5px; }
        .placar-input { width: 45px; height: 45px; background: #000; border: 1px solid var(--primary); color: #fff; text-align: center; font-size: 20px; font-weight: bold; border-radius: 8px; }
        .ranking-box { background: #111; margin-top: 20px; padding: 15px; border-radius: 15px; border: 2px solid var(--accent); }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        .btn-secreto { color: #222; font-size: 9px; cursor: pointer; margin-top: 30px; display: inline-block; }
    </style>
</head>
<body>
<div class="container">
    <div id="msg-boas-vindas" style="color:var(--primary); font-weight:bold; text-align:center; margin-bottom:10px"></div>
    <div class="card">
        <div id="view-login">
            <h2>MAU<span>BET</span></h2>
            <input type="text" id="user-nome" placeholder="NOME COMPLETO">
            <input type="tel" id="user-tel" placeholder="TELEFONE">
            <button class="btn-green" onclick="handleAcesso()">ENTRAR NO BOLÃO</button>
            <div id="login-mestre" class="hidden">
                <input type="password" id="pass-mestre" placeholder="SENHA MASTER">
                <button class="btn-accent" onclick="acessoMestre()">LIBERAR PAINEL</button>
            </div>
            <span class="btn-secreto" onclick="document.getElementById('login-mestre').classList.toggle('hidden')">v36.1</span>
        </div>

        <div id="view-main" class="hidden">
            <div id="bloco-mestre" class="hidden" style="background:#000; padding:15px; border-radius:15px; border:1px dashed var(--accent); margin-bottom:20px; text-align:left">
                <b style="color:var(--accent)">1. CADASTRAR JOGO:</b>
                <input type="text" id="input-casa" placeholder="TIME CASA">
                <input type="text" id="input-fora" placeholder="TIME FORA">
                <input type="datetime-local" id="input-data">
                <button class="btn-accent" onclick="addJogoNovo()">+ SALVAR TIME</button>
                <button class="btn-green" onclick="setRodada(true)">🚀 LIBERAR PARA TODOS</button>
                <hr style="border-color:#333; margin:15px 0">
                <b style="color:var(--primary)">2. RESULTADOS REAIS:</b>
                <div id="lista-mestre-resultados"></div>
            </div>

            <div id="display-jogos"></div>
            <button id="btn-salvar-jogo" class="hidden btn-green" onclick="salvarPalpites()">🔒 ENVIAR MEU BILHETE</button>
            
            <div id="ranking-container" class="ranking-box">
                <h3 style="color:var(--accent); margin:0 0 10px 0">🏆 RANKING</h3>
                <div id="ranking-lista"></div>
            </div>
            <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#444; font-size:10px; border:none; margin-top:30px">SAIR</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", 
        authDomain: "bolao-d2baf.firebaseapp.com", 
        projectId: "bolao-d2baf", 
        storageBucket: "bolao-d2baf.firebasestorage.app", 
        messagingSenderId: "955171998764", 
        appId: "1:955171998764:web:2ccf8f2b6f23c300755589" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const MASTER_KEY = "259225";

    window.onload = () => { if(localStorage.getItem('maubet_token')) startApp(); };

    function handleAcesso() {
        const n = document.getElementById('user-nome').value.toUpperCase().trim();
        if(!n) return alert("Nome!");
        localStorage.setItem('maubet_n', n);
        localStorage.setItem('maubet_token', 'user');
        startApp();
    }

    function acessoMestre() {
        if(document.getElementById('pass-mestre').value === MASTER_KEY) {
            localStorage.setItem('maubet_n', "MESTRE MAU");
            localStorage.setItem('maubet_token', 'admin');
            startApp();
        }
    }

    function startApp() {
        document.getElementById('view-login').classList.add('hidden');
        document.getElementById('view-main').classList.remove('hidden');
        document.getElementById('msg-boas-vindas').innerText = "Olá, " + localStorage.getItem('maubet_n');

        db.collection("config").doc("status").onSnapshot(doc => {
            const liberada = doc.exists && doc.data().liberada;
            const admin = localStorage.getItem('maubet_token') === 'admin';
            if(admin) document.getElementById('bloco-mestre').classList.remove('hidden');
            renderConteudo(liberada, admin);
        });
    }

    async function addJogoNovo() {
        const c = document.getElementById('input-casa').value.toUpperCase().trim();
        const f = document.getElementById('input-fora').value.toUpperCase().trim();
        const d = document.getElementById('input-data').value;
        if(c && f && d) {
            await db.collection("jogos").add({ home: c, away: f, inicio: d, resH: null, resF: null, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            alert("Jogo adicionado!");
            document.getElementById('input-casa').value = ""; document.getElementById('input-fora').value = "";
        }
    }

    async function setRodada(v) { await db.collection("config").doc("status").set({ liberada: v }); alert("Rodada Liberada!"); }

    function renderConteudo(liberada, admin) {
        db.collection("jogos").orderBy("timestamp", "asc").onSnapshot(snap => {
            const container = document.getElementById('display-jogos');
            const listaMestre = document.getElementById('lista-mestre-resultados');
            container.innerHTML = ""; listaMestre.innerHTML = "";
            let jogosFinais = {};

            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                if(d.resH !== null) jogosFinais[id] = {h: d.resH, f: d.resF};

                const hI = d.home.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
                const aI = d.away.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');

                // LISTA PARA TODOS
                if(liberada || admin) {
                    container.innerHTML += `
                        <div class="jogo-item">
                            <div class="time-box"><img src="escudos/${hI}.png" class="escudo" onerror="this.src='escudos/default.png'">${d.home}</div>
                            <div>
                                ${d.resH !== null ? `<span style="color:var(--accent); font-size:10px">FINAL: ${d.resH}x${d.resF}</span>` : ''}
                                <div style="display:flex; gap:5px">
                                    <input type="number" class="placar-input user-p" id="p-${id}-h" oninput="checkInputs()" ${d.resH !== null ? 'disabled' : ''}>
                                    <input type="number" class="placar-input user-p" id="p-${id}-f" oninput="checkInputs()" ${d.resH !== null ? 'disabled' : ''}>
                                </div>
                            </div>
                            <div class="time-box"><img src="escudos/${aI}.png" class="escudo" onerror="this.src='escudos/default.png'">${d.away}</div>
                        </div>`;
                }

                // PAINEL DE RESULTADOS (MESTRE)
                if(admin) {
                    listaMestre.innerHTML += `
                        <div style="margin-bottom:8px; font-size:11px">
                            ${d.home} <input type="number" id="m-${id}-h" style="width:30px; background:#000; color:#fff" value="${d.resH}"> x 
                            <input type="number" id="m-${id}-f" style="width:30px; background:#000; color:#fff" value="${d.resF}"> ${d.away}
                            <button onclick="salvarPlacarFinal('${id}')" style="width:auto; padding:5px; margin:0">OK</button>
                        </div>`;
                }
            });
            atualizarRanking(jogosFinais);
        });
    }

    async function salvarPlacarFinal(id) {
        const h = document.getElementById(`m-${id}-h`).value;
        const f = document.getElementById(`m-${id}-f`).value;
        if(h !== "" && f !== "") {
            await db.collection("jogos").doc(id).update({ resH: parseInt(h), resF: parseInt(f) });
            alert("Placar Salvo!");
        }
    }

    function checkInputs() {
        const inputs = document.querySelectorAll('.user-p:not([disabled])');
        const preenchido = Array.from(inputs).every(i => i.value !== "");
        document.getElementById('btn-salvar-jogo').classList.toggle('hidden', !preenchido || inputs.length === 0);
    }

    async function salvarPalpites() {
        const p = {}; 
        document.querySelectorAll('.user-p').forEach(i => p[i.id] = i.value);
        await db.collection("apostas").add({
            nome: localStorage.getItem('maubet_n'),
            palpites: p, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Enviado com sucesso!");
        location.reload();
    }

    async function atualizarRanking(jogosFinais) {
        const snap = await db.collection("apostas").get();
        let rank = [];
        snap.forEach(doc => {
            const a = doc.data();
            let pts = 0;
            for(let jId in jogosFinais) {
                const rH = jogosFinais[jId].h;
                const rF = jogosFinais[jId].f;
                const pH = parseInt(a.palpites[`p-${jId}-h`]);
                const pF = parseInt(a.palpites[`p-${jId}-f`]);
                if(!isNaN(pH) && !isNaN(pF)) {
                    if(pH === rH && pF === rF) pts += 10;
                    else if((rH > rF && pH > pF) || (rF > rH && pF > pH) || (rH === rF && pH === pF)) pts += 6;
                }
            }
            rank.push({n: a.nome, p: pts});
        });
        rank.sort((a,b) => b.p - a.p);
        const list = document.getElementById('ranking-lista');
        list.innerHTML = "";
        rank.forEach((r, i) => {
            list.innerHTML += `<div class="ranking-item"><span>${i+1}º ${r.n}</span> <b>${r.p} pts</b></div>`;
        });
    }
</script>
</body>
</html>
