<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet - O Bolão do Mestre ⚽</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg-dark: #121212; --card-bg: #1e1e1e; --accent: #ffb300; --danger: #ff5252; --text-muted: #aaa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; text-align: center; padding: 15px; margin: 0; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 550px; margin: 10px auto; }
        
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 5px; }
        .logo-bet { color: var(--accent); background: #333; padding: 0 10px; border-radius: 8px; }
        .saudacao { color: var(--primary); font-weight: bold; margin: 10px 0; font-size: 18px; }

        /* Abas do Painel Master */
        .aba-container { display: flex; gap: 5px; margin: 15px 0; background: #000; padding: 5px; border-radius: 12px; }
        .aba-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #666; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .aba-btn.active { background: var(--accent); color: #000; }

        /* Layout dos Jogos (Horizontal) */
        .jogo-card { background: #252525; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; border-left: 4px solid var(--accent); position: relative; }
        .jogo-card.desativado { opacity: 0.4; border-left-color: #555; }
        .info-data { width: 75px; font-size: 10px; color: var(--text-muted); border-right: 1px solid #444; text-align: left; }
        .confronto { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .time { display: flex; flex-direction: column; align-items: center; width: 35%; font-size: 10px; font-weight: bold; }
        .escudo { width: 35px; height: 35px; object-fit: contain; margin-bottom: 3px; }
        .placar-in { width: 42px !important; height: 38px !important; background: #3d3d3d !important; color: #fff; border: 1px solid #555; border-radius: 8px; text-align: center; font-size: 20px; font-weight: bold; }

        /* Listas Financeiro/Usuários */
        .user-row { background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; border-bottom: 2px solid #333; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .status-pendente { background: var(--accent); color: #000; }
        .status-pago { background: var(--primary); color: #000; }

        button { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-reset { background: none; color: var(--danger); border: 1px solid var(--danger); padding: 5px; font-size: 10px; border-radius: 5px; float: right; }
        .hidden { display: none; }

        /* Modais MauBet */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bolão <span class="logo-bet">MauBet</span></h1>
    <div id="statusMsg" class="saudacao">Iniciando...</div>

    <div id="loginArea" class="hidden">
        <input type="text" id="userName" placeholder="Nome Completo" style="width:85%; padding:12px; margin:10px; border-radius:8px;">
        <input type="text" id="userPhone" placeholder="DDD + Celular" style="width:85%; padding:12px; margin:10px; border-radius:8px;">
        <div id="recaptcha-container"></div>
        <button onclick="enviarSMS()">RECEBER SMS</button>
    </div>

    <div id="otpArea" class="hidden">
        <input type="number" id="otpCode" placeholder="Código SMS">
        <button onclick="confirmarCodigo()">ENTRAR</button>
    </div>

    <div id="mestreChoiceArea" class="hidden">
        <button onclick="irParaAposta()">FAZER MINHA APOSTA</button>
        <button style="background:var(--accent)" onclick="abrirPainelMaster()">PAINEL DO MESTRE</button>
    </div>

    <div id="painelGestor" class="hidden">
        <div class="aba-container">
            <button class="aba-btn active" onclick="mudarAba('tabJogos')">JOGOS / IA</button>
            <button class="aba-btn" onclick="mudarAba('tabFinanceiro')">FINANCEIRO</button>
            <button class="aba-btn" onclick="mudarAba('tabApostadores')">OFICIAIS</button>
        </div>

        <div id="tabJogos">
            <input type="file" id="fileIA" style="font-size:10px;">
            <button onclick="lerIA()" style="background:#444; color:#fff; padding:10px; font-size:11px;">LER PRINT DA RODADA</button>
            <div id="containerJogosAdmin" style="margin-top:15px;"></div>
        </div>

        <div id="tabFinanceiro" class="hidden">
            <div id="listaPendentes"></div>
        </div>

        <div id="tabApostadores" class="hidden">
            <div id="listaConfirmados"></div>
        </div>
    </div>

    <div id="apostaArea" class="hidden">
        <div id="listaJogosCliente"></div>
        <button id="btnFinalizar" onclick="abrirConfirmacao()">🔒 FINALIZAR E ENVIAR</button>
        <button id="btnVerOutros" class="hidden" style="background:#333; color:#fff; font-size:11px;">👀 VER PALPITES DOS OUTROS</button>
    </div>
</div>

<div id="modalAviso" class="modal-overlay">
    <div class="modal-box">
        <h3 id="mTitul">AVISO</h3>
        <p id="mMsg" style="font-size:14px; color:#ccc;"></p>
        <button style="padding:12px; border-radius:10px; border:none; background:var(--accent); font-weight:bold; width:100%;" onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", authDomain: "bolao-d2baf.firebaseapp.com", projectId: "bolao-d2baf", storageBucket: "bolao-d2baf.firebasestorage.app", messagingSenderId: "955171998764", appId: "1:955171998764:web:2ccf8f2b6f23c300755589" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const MASTER_PHONE = "+5524981035118";

    window.onload = function() {
        const nome = localStorage.getItem('maubet_nome');
        const tel = localStorage.getItem('maubet_tel');
        if (nome && tel) logar(tel, nome);
        else {
            document.getElementById('loginArea').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "Bem-vindo ao MauBet!";
        }
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
    };

    function logar(tel, nome) {
        localStorage.setItem('maubet_nome', nome);
        localStorage.setItem('maubet_tel', tel);
        document.getElementById('statusMsg').innerText = `Boa sorte, ${nome}!`;
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('otpArea').classList.add('hidden');
        if(tel === MASTER_PHONE) document.getElementById('mestreChoiceArea').classList.remove('hidden');
        else irParaAposta();
    }

    function mudarAba(id) {
        document.getElementById('tabJogos').classList.add('hidden');
        document.getElementById('tabFinanceiro').classList.add('hidden');
        document.getElementById('tabApostadores').classList.add('hidden');
        document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function lerIA() {
        mostrarAviso("PROCESSANDO", "A IA está lendo o print e gerando os jogos... Aguarde.");
        setTimeout(() => {
            fecharModal();
            const container = document.getElementById('containerJogosAdmin');
            container.innerHTML = `
                <div class="jogo-card">
                    <div class="info-data"><b>DOM, 16:00</b></div>
                    <div class="confronto"><b>FLAMENGO x VASCO</b></div>
                    <button onclick="toggleJogo(this)" style="width:70px; font-size:9px; padding:5px; background:var(--danger); color:#fff; margin:0;">DESATIVAR</button>
                </div>`;
            mostrarAviso("SUCESSO", "Jogos carregados! Ative ou desative antes de liberar para a galera.");
        }, 2500);
    }

    function toggleJogo(btn) {
        const card = btn.parentElement;
        if(btn.innerText === "DESATIVAR") {
            btn.innerText = "ATIVAR"; btn.style.background = "var(--primary)"; card.classList.add('desativado');
        } else {
            btn.innerText = "DESATIVAR"; btn.style.background = "var(--danger)"; card.classList.remove('desativado');
        }
    }

    function aprovarPix(nome) {
        mostrarAviso("PAGO!", `${nome} agora está na lista final e o bilhete dele está valendo.`);
        // Aqui o código move o cara do Financeiro para a aba de Oficiais
    }

    function abrirPainelMaster() { 
        document.getElementById('mestreChoiceArea').classList.add('hidden');
        document.getElementById('painelGestor').classList.remove('hidden');
        // Carrega os devedores no financeiro
        document.getElementById('listaPendentes').innerHTML = `
            <div class="user-row">
                <span class="status-tag status-pendente">AGUARDANDO PIX</span>
                <b>MAURICIO BARCELLOS</b><br>
                <button class="btn-aprovar" onclick="aprovarPix('MAURICIO')" style="background:var(--primary); padding:10px; margin-top:10px; border-radius:8px; border:none; font-weight:bold;">APROVAR PAGAMENTO ✓</button>
            </div>`;
    }

    function irParaAposta() {
        document.getElementById('mestreChoiceArea').classList.add('hidden');
        document.getElementById('apostaArea').classList.remove('hidden');
        carregarJogosCliente();
    }

    function carregarJogosCliente() {
        document.getElementById('listaJogosCliente').innerHTML = `
            <div class="jogo-card">
                <div class="info-data"><b>DOM, 16:00</b></div>
                <div class="confronto">
                    <div class="time"><img src="escudos/fla.png" class="escudo"><span>FLA</span></div>
                    <input type="number" class="placar-in" placeholder="0">
                    <span style="color:var(--primary); font-weight:900;">X</span>
                    <input type="number" class="placar-in" placeholder="0">
                    <div class="time"><img src="escudos/vas.png" class="escudo"><span>VAS</span></div>
                </div>
            </div>`;
    }

    function mostrarAviso(t, m) {
        document.getElementById('mTitul').innerText = t;
        document.getElementById('mMsg').innerText = m;
        document.getElementById('modalAviso').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modalAviso').style.display = 'none'; }
    function abrirConfirmacao() { mostrarAviso("CONFIRMAR?", "Na mosca: 10 pts | Resultado: 6 pts. Deseja enviar?"); }
</script>
</body>
</html>
