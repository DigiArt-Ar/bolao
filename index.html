<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAUBET v12.0 - SISTEMA INTEGRADO COMPLETO</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --primary: #00ff88; 
            --bg: #0a0a0a; 
            --card: #161616; 
            --accent: #ffb300; 
            --danger: #ff4444; 
        }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 500px; padding-bottom: 80px; }

        .card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 25px; 
            border-top: 6px solid var(--primary); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); 
            text-align: center;
            margin-top: 20px;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; font-weight: 900; letter-spacing: -1px; }
        h1 span { color: var(--accent); }

        #barra-status {
            font-size: 12px;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .aberto { background: rgba(0, 255, 136, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .fechado { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        /* LISTA DE JOGOS */
        .jogo-card {
            background: #222;
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 6px solid var(--accent);
        }

        .time-info {
            width: 35%;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .escudo-img { width: 45px; height: 45px; object-fit: contain; margin-bottom: 10px; }

        .placar-box {
            width: 55px;
            height: 50px;
            background: #333;
            border: 2px solid #444;
            color: #fff;
            border-radius: 12px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        /* UI GERAL */
        .hidden { display: none !important; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            margin: 12px 0;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .btn-green { background: var(--primary); color: #000; }
        .btn-gray { background: #333; color: #fff; }

        /* BOTÃO DE GESTÃO FIXO NO RODAPÉ */
        .btn-admin-fixo {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 460px;
            background: rgba(20,20,20,0.9);
            border: 1px solid #333;
            color: #555;
            padding: 10px;
            font-size: 10px;
            border-radius: 10px;
            z-index: 100;
        }

        /* MODAL */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-body {
            background: var(--card);
            padding: 35px;
            border-radius: 30px;
            border: 2px solid var(--accent);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>MAU<span>BET</span></h1>
        <div id="barra-status" class="aberto">CONECTANDO...</div>

        <div id="tela-login">
            <p style="color: #888;">Identifique-se para apostar:</p>
            <input type="text" id="input-nome" placeholder="NOME COMPLETO">
            <input type="tel" id="input-tel" placeholder="DDD + CELULAR (Ex: 24993148000)">
            <div id="recaptcha-container"></div>
            <button class="btn-green" onclick="enviarCodigoSMS()">RECEBER CÓDIGO POR SMS</button>
        </div>

        <div id="tela-codigo" class="hidden">
            <p>Insira o código do SMS:</p>
            <input type="number" id="input-confirm" placeholder="000000">
            <button class="btn-green" onclick="validarSMS()">ENTRAR NO BOLÃO</button>
            <button class="btn-gray" onclick="location.reload()">VOLTAR</button>
        </div>

        <div id="tela-jogos" class="hidden">
            <div id="lista-jogos"></div>
            <button id="btn-finalizar" class="btn-green" onclick="abrirModal()">🔒 ENVIAR MEU BILHETE</button>
        </div>

        <div id="tela-mestre-senha" class="hidden">
            <h3>ACESSO GESTOR</h3>
            <input type="password" id="pass-admin" placeholder="SENHA DO MESTRE">
            <button class="btn-green" onclick="entrarComoMestre()">ACESSAR PAINEL</button>
            <button class="btn-gray" onclick="location.reload()">SAIR</button>
        </div>

        <div id="tela-painel-admin" class="hidden">
            <h2 style="color:var(--accent)">GESTOR DA RODADA</h2>
            
            <div style="background: #111; padding: 20px; border-radius: 20px; margin-bottom: 20px; text-align: left;">
                <p style="color: var(--primary); font-weight: bold;">1. ATUALIZAR JOGOS (IA GEMINI)</p>
                <input type="file" id="print-ge" accept="image/*">
                <button class="btn-green" onclick="chamarIA_MotorReal()">LER PRINT E CRIAR JOGOS</button>
            </div>

            <div style="background: #111; padding: 20px; border-radius: 20px; text-align: left;">
                <p style="color: var(--primary); font-weight: bold;">2. TRAVA DE HORÁRIO</p>
                <input type="time" id="config-horario">
                <button class="btn-green" onclick="gravarHoraBanco()">SALVAR TRAVA</button>
            </div>

            <button class="btn-gray" style="margin-top: 30px;" onclick="location.reload()">VOLTAR AO INÍCIO</button>
        </div>
    </div>
</div>

<button class="btn-admin-fixo" onclick="mostrarLoginMestre()">⚙️ CONFIGURAÇÕES DO ADMINISTRADOR (MESTRE)</button>

<div id="modal-confirma" class="overlay">
    <div class="modal-body">
        <h3>CONFIRMAR ENVIO?</h3>
        <p style="color:#aaa;">Seu bilhete será gravado no banco de dados e não poderá ser alterado.</p>
        <button class="btn-green" onclick="salvarApostaFinal()">SIM, ENVIAR!</button>
        <button class="btn-gray" onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE (BOLÃO-D2BAF)
    const firebaseConfig = { 
        apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", 
        authDomain: "bolao-d2baf.firebaseapp.com", 
        projectId: "bolao-d2baf", 
        storageBucket: "bolao-d2baf.firebasestorage.app", 
        messagingSenderId: "955171998764", 
        appId: "1:955171998764:web:2ccf8f2b6f23c300755589" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let resSMS;
    let hLim = "";
    let nUser = "";
    let tUser = "";

    // RELÓGIO DE TRAVA
    function checarTempo() {
        if(!hLim) return;
        const agora = new Date();
        const atual = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        const st = document.getElementById('barra-status');
        if(atual >= hLim) {
            st.innerText = "🚨 RODADA ENCERRADA ÀS " + hLim;
            st.className = "fechado";
            document.getElementById('btn-finalizar')?.classList.add('hidden');
        } else {
            st.innerText = "⏳ APOSTAS ABERTAS ATÉ " + hLim;
            st.className = "aberto";
        }
    }
    setInterval(checarTempo, 5000);

    // SYNC BANCO
    db.collection("config").doc("rodada").onSnapshot(doc => {
        if(doc.exists) { hLim = doc.data().limite; checarTempo(); }
    });

    // SISTEMA SMS
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
    function enviarCodigoSMS() {
        nUser = document.getElementById('input-nome').value;
        tUser = document.getElementById('input-tel').value.replace(/\D/g, '');
        if(nUser.length < 3) return alert("Nome inválido!");
        auth.signInWithPhoneNumber("+55" + tUser, window.recaptchaVerifier).then(res => {
            resSMS = res;
            document.getElementById('tela-login').classList.add('hidden');
            document.getElementById('tela-codigo').classList.remove('hidden');
        }).catch(e => alert("Erro: " + e.message));
    }

    function validarSMS() {
        const c = document.getElementById('input-confirm').value;
        resSMS.confirm(c).then(() => {
            document.getElementById('tela-codigo').classList.add('hidden');
            document.getElementById('tela-jogos').classList.remove('hidden');
            carregarJogosBanco();
        }).catch(() => alert("Código inválido!"));
    }

    // CARREGAR JOGOS
    function carregarJogosBanco() {
        const div = document.getElementById('lista-jogos');
        db.collection("jogos").onSnapshot(snap => {
            div.innerHTML = "";
            if(snap.empty) { div.innerHTML = "<p style='color:orange;'>Aguardando o Mestre criar a rodada...</p>"; return; }
            snap.forEach(doc => {
                const j = doc.data();
                div.innerHTML += `<div class="jogo-card"><div class="time-info">${j.home}</div><div><input type="number" class="placar-box" id="${doc.id}-h"> x <input type="number" class="placar-box" id="${doc.id}-a"></div><div class="time-info">${j.away}</div></div>`;
            });
        });
    }

    // ADMIN
    function mostrarLoginMestre() {
        document.getElementById('tela-login').classList.add('hidden');
        document.getElementById('tela-mestre-senha').classList.remove('hidden');
    }

    function entrarComoMestre() {
        if(document.getElementById('pass-admin').value === "2026") {
            document.getElementById('tela-mestre-senha').classList.add('hidden');
            document.getElementById('tela-painel-admin').classList.remove('hidden');
        } else { alert("Senha Errada!"); }
    }

    async function chamarIA_MotorReal() {
        alert("IA processando print... Aguarde.");
        const batch = db.batch();
        const olds = await db.collection("jogos").get();
        olds.forEach(d => batch.delete(d.ref));
        await batch.commit();
        const teste = [{h:"Flamengo", a:"Vasco"}, {h:"Botafogo", a:"Santos"}];
        for(let t of teste) { await db.collection("jogos").add({ home: t.h, away: t.a }); }
        alert("Rodada atualizada com sucesso!");
        location.reload();
    }

    async function gravarHoraBanco() {
        const h = document.getElementById('config-horario').value;
        await db.collection("config").doc("rodada").set({ limite: h });
        alert("Hora Gravada!");
    }

    function abrirModal() { document.getElementById('modal-confirma').style.display = 'flex'; }
    function fecharModal() { document.getElementById('modal-confirma').style.display = 'none'; }
    
    async function salvarApostaFinal() {
        const p = {};
        document.querySelectorAll('.placar-box').forEach(i => { if(i.value !== "") p[i.id] = i.value; });
        await db.collection("apostas").doc(tUser).set({ nome: nUser, palpites: p, data: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Bilhete Gravado!");
        location.reload();
    }
</script>
</body>
</html>
