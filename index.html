<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa 2026 DigiArt - Bolão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================
           ESTILIZAÇÃO VISUAL (CSS)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f1115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: #1a1d24;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        h2, h3 {
            margin-bottom: 15px;
            text-align: center;
        }

        p {
            margin-bottom: 15px;
            color: #ccc;
            text-align: center;
            font-size: 14px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2f3a;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        #btn-admin {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        #btn-admin:hover { color: #fff; }

        input[type="text"], input[type="number"] {
            background-color: #252a34;
            border: 1px solid #3a4252;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            outline: none;
        }

        input[type="text"] { width: 100%; margin-bottom: 20px; font-size: 16px; }

        button {
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-bottom: 10px;
        }

        .btn-sucesso { background-color: #00c853; }
        .btn-sucesso:hover { background-color: #00a844; }

        .btn-alerta { background-color: #ff3d00; }
        .btn-alerta:hover { background-color: #dd3300; }

        .btn-secundario { background-color: #4b5563; }
        .btn-secundario:hover { background-color: #374151; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: #252a34;
            color: #aaa;
            padding: 10px;
            font-size: 14px;
        }

        .tab-btn.active {
            background-color: #007bff;
            color: #fff;
        }

        .aviso-trava {
            font-size: 13px;
            color: #ffb300;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }

        #lista-jogos {
            margin-bottom: 20px;
        }

        .card-jogo {
            background-color: #252a34;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #007bff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .info-jogo {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .confronto {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .time { 
            width: 35%; 
            text-align: center; 
            font-size: 14px; 
            font-weight: 600;
        }
        
        .placar-inputs { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
        }
        
        .placar-inputs input { 
            width: 45px; 
            height: 38px; 
            font-size: 18px; 
            font-weight: bold;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .linha-ranking {
            display: flex;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid #2a2f3a;
        }
        
        .cabecalho-ranking {
            font-weight: bold;
            border-bottom: 2px solid #007bff;
            color: #007bff;
        }
    </style>
</head>
<body>

    <div id="tela-login" class="container">
        <h2>Bolão Copa 2026</h2>
        <p>Digite seu nome para entrar no bolão:</p>
        <input type="text" id="input-nome" placeholder="Seu nome ou apelido">
        <button id="btn-entrar" class="btn-sucesso">Confirmar e Entrar</button>
    </div>

    <div id="tela-principal" class="container hidden">
        <header>
            <span id="boas-vindas">Olá, <strong id="nome-usuario"></strong></span>
            <button id="btn-admin" title="Área do Administrador"><i class="fas fa-cog"></i></button>
        </header>

        <div class="tabs">
            <button id="tab-palpites" class="tab-btn active">Meus Palpites</button>
            <button id="tab-ranking" class="tab-btn">Ranking Geral</button>
        </div>

        <div id="conteudo-palpites" class="tab-conteudo">
            <p class="aviso-trava">Os palpites travam 30 minutos antes do primeiro jogo (14/06 às 18:00)!</p>
            <div id="lista-jogos">
                </div>
            
            <button id="btn-salvar-palpites" class="btn-sucesso">Salvar Todos os Palpites</button>
            <button id="btn-cancelar-admin" class="btn-secundario hidden">Cancelar / Voltar</button>
        </div>

        <div id="conteudo-ranking" class="tab-conteudo hidden">
            <h3>Classificação Geral</h3>
            <div id="lista-ranking">
                </div>
        </div>
    </div>
