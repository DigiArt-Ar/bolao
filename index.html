<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MauBet - O Bolão do Mestre ⚽</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #00ff88; --bg-dark: #121212; --card-bg: #1e1e1e; --accent: #ffb300; --danger: #ff5252; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: #fff; text-align: center; padding: 15px; margin: 0; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; border-top: 5px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; margin: 10px auto; }
        h1 { font-size: 26px; font-weight: 900; margin-bottom: 5px; }
        .logo-bet { color: var(--accent); background: #333; padding: 0 10px; border-radius: 8px; }
        
        /* Inputs e Botões Estilizados */
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: #fff; text-align: center; font-size: 16px; }
        button { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 90%; font-weight: bold; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        
        /* Abas e Listas */
        .aba-container { display: flex; gap: 5px; margin: 15px 0; background: #000; padding: 5px; border-radius: 12px; }
        .aba-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #666; border-radius: 8px; font-size: 11px; cursor: pointer; }
        .aba-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        .user-row { background: #2a2a2a; padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: left; position: relative; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: bold; margin-bottom: 5px; display: inline-block; }

        /* Jogo Horizontal */
        .jogo-card { background: #252525; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; border-left: 4px solid var(--accent); }
        .confronto { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .placar-in { width: 45px !important; height: 40px !important; background: #3d3d3d !important; color: #fff; border: 1px solid #555; border-radius: 8px; font-size: 20px; font-weight: bold; padding: 0 !important; }

        .hidden { display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 20px; padding: 25px; width: 85%; max-width: 350px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Bolão <span class="logo-bet">MauBet</span></h1>
    <div id="statusMsg" style="color:var(--primary); font-weight:bold; margin:10px 0;">Carregando...</div>

    <div id="loginArea" class="hidden">
        <input type="text" id="userName" placeholder="Seu Nome Completo">
        <input type="text" id="userPhone" placeholder="Ex: 24993148000">
        <div id="recaptcha-container"></div>
        <button id="btnEnviarSMS" onclick="enviarSMS()">Receber SMS</button>
    </div>

    <div id="otpArea" class="hidden">
        <input type="number" id="otpCode" placeholder="Código de 6 dígitos">
        <button onclick="confirmarCodigo()">Validar e Entrar</button>
    </div>

    <div id="painelGestor" class="hidden">
        <div class="aba-container">
            <button class="aba-btn active" onclick="mudarAba('tabJogos')">JOGOS / IA</button>
            <button class="aba-btn" onclick="mudarAba('tabFinanceiro')">FINANCEIRO</button>
            <button class="aba-btn" onclick="mudarAba('tabApostadores')">OFICIAIS</button>
        </div>
        <div id="tabJogos">
            <input type="file" id="fileIA" style="font-size:10px;">
            <button onclick="lerIA()" style="background:#444; color:#fff;">LÊR PRINT</button>
            <div id="jogosAdmin" style="margin-top:15px;"></div>
        </div>
        <div id="tabFinanceiro" class="hidden">
            <div id="listaPendentes">
                <div class="user-row">
                    <span class="status-tag" style="background:var(--accent); color:#000;">AGUARDANDO PIX</span>
                    <b>MAURICIO BARCELLOS</b>
                    <button onclick="aprovarPix('MAURICIO')" style="height:40px; padding:0; margin-top:10px;">APROVAR PIX ✓</button>
                </div>
            </div>
        </div>
        <div id="tabApostadores" class="hidden"><div id="listaConfirmados"></div></div>
    </div>

    <div id="apostaArea" class="hidden">
        <div id="listaJogosCliente"></div>
        <button id="btnFinalizar" onclick="abrirConfirmacao()">🔒 FINALIZAR E ENVIAR</button>
    </div>
</div>

<div id="modalAviso" class="modal-overlay">
    <div class="modal-box">
        <h3 id="mTitul" style="color:var(--accent)">AVISO</h3>
        <p id="mMsg" style="font-size:14px; color:#ccc;"></p>
        <button onclick="fecharModal()">OK</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyA_G6wZX1LGYBdnwMonMd-srnV_ktBPMNU", authDomain: "bolao-d2baf.firebaseapp.com", projectId: "bolao-d2baf", storageBucket: "bolao-d2baf.firebasestorage.app", messagingSenderId: "955171998764", appId: "1:955171998764:web:2ccf8f2b6f23c300755589" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let confirmationResult;

    window.onload = function() {
        const nome = localStorage.getItem('maubet_nome');
        if (nome) logar(nome);
        else {
            document.getElementById('loginArea').classList.remove('hidden');
            document.getElementById('statusMsg').innerText = "Bem-vindo!";
        }
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 'size': 'invisible' });
    };

    function enviarSMS() {
        const phone = "+55" + document.getElementById('userPhone').value.replace(/\D/g, '');
        if(phone.length < 13) return mostrarAviso("ERRO", "Digite o número completo com DDD.");
        
        document.getElementById('btnEnviarSMS').innerText = "ENVIANDO...";
        auth.signInWithPhoneNumber(phone, window.recaptchaVerifier).then(res => {
            confirmationResult = res;
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('otpArea').classList.remove('hidden');
        }).catch(err => {
            mostrarAviso("ERRO", "Falha no SMS: " + err.message);
            document.getElementById('btnEnviarSMS').innerText = "Receber SMS";
        });
    }

    function confirmarCodigo() {
        const code = document.getElementById('otpCode').value;
        confirmationResult.confirm(code).then(res => {
            logar(document.getElementById('userName').value);
        }).catch(() => mostrarAviso("ERRO", "Código inválido!"));
    }

    function logar(nome) {
        localStorage.setItem('maubet_nome', nome);
        document.getElementById('statusMsg').innerText = `Boa sorte, ${nome}!`;
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('otpArea').classList.add('hidden');
        
        // Se for o seu número, mostra o painel gestor (Exemplo simplificado)
        if(nome.toUpperCase() === "MAURICIO") document.getElementById('painelGestor').classList.remove('hidden');
        else irParaAposta();
    }

    function irParaAposta() {
        document.getElementById('apostaArea').classList.remove('hidden');
        const container = document.getElementById('listaJogosCliente');
        container.innerHTML = `<div class="jogo-card">
            <div class="confronto">
                <b>FLA</b> <input type="number" class="placar-in"> 
                <span style="color:var(--primary)">X</span> 
                <input type="number" class="placar-in"> <b>VAS</b>
            </div>
        </div>`;
    }

    function mudarAba(id) {
        document.getElementById('tabJogos').classList.add('hidden');
        document.getElementById('tabFinanceiro').classList.add('hidden');
        document.getElementById('tabApostadores').classList.add('hidden');
        document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function mostrarAviso(t, m) {
        document.getElementById('mTitul').innerText = t;
        document.getElementById('mMsg').innerText = m;
        document.getElementById('modalAviso').style.display = 'flex';
    }
    function fecharModal() { document.getElementById('modalAviso').style.display = 'none'; }
    function abrirConfirmacao() { mostrarAviso("ENVIAR?", "Placar Exato: 10 pts | Resultado: 6 pts. Confirmar?"); }
    
    function lerIA() {
        mostrarAviso("PROCESSANDO", "IA MauBet lendo o print... Aguarde.");
        setTimeout(() => { fecharModal(); mostrarAviso("SUCESSO", "Rodada carregada!"); }, 2000);
    }
</script>
</body>
</html>
