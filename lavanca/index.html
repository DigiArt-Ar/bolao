<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alavancagem - Copa</title>
    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --cor-borda: #29292e;
            --laranja-bet: #f25a22;
            --verde-sucesso: #00b37e;
            --vermelho-erro: #f75a68;
            --texto-claro: #e1e1e6;
            --texto-escuro: #8d8d99;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-claro);
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--cor-borda);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            color: var(--laranja-bet);
            text-transform: uppercase;
        }

        .toggle-config {
            background-color: #29292e;
            color: var(--texto-claro);
            border: 1px solid var(--laranja-bet);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-config.ativo {
            background-color: var(--laranja-bet);
            color: white;
        }

        .config-banca {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--cor-borda);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--texto-escuro);
            text-transform: uppercase;
        }

        .input-group input {
            background-color: var(--bg-principal);
            border: 1px solid var(--cor-borda);
            color: var(--texto-claro);
            padding: 10px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .input-group input:focus {
            border-color: var(--laranja-bet);
            outline: none;
        }

        .painel-edicao-banca {
            background-color: rgba(242, 90, 34, 0.05);
            border: 1px dashed var(--laranja-bet);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .painel-valores {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--cor-borda);
        }

        .bloco-valor span {
            display: block;
            font-size: 0.8rem;
            color: var(--texto-escuro);
        }

        .bloco-valor strong {
            font-size: 1.2rem;
        }

        .dia-secao {
            margin-bottom: 20px;
        }

        .dia-titulo {
            font-size: 1rem;
            color: var(--laranja-bet);
            margin-bottom: 10px;
            padding-left: 5px;
            border-left: 3px solid var(--laranja-bet);
        }

        .lista-jogos {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-jogo {
            background-color: var(--bg-card);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid var(--cor-borda);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-jogo.status-ganhou { border-color: var(--verde-sucesso); }
        .card-jogo.status-perdeu { border-color: var(--vermelho-erro); }

        .confronto-probabilidades {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .time-prob {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 110px;
        }

        .time-prob span:first-child {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .prob-badge {
            color: var(--laranja-bet);
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 4px;
        }

        .vs-divider {
            color: var(--texto-escuro);
            font-size: 0.85rem;
            font-weight: normal;
        }

        .botoes-odds {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn-odd {
            flex: 1;
            max-width: 140px;
            background-color: var(--bg-principal);
            border: 1px solid var(--cor-borda);
            color: var(--texto-claro);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.2s;
        }

        .btn-odd span {
            display: block;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--laranja-bet);
            margin-top: 2px;
        }

        .btn-odd.selecionado {
            border-color: var(--laranja-bet);
            background-color: rgba(242, 90, 34, 0.1);
        }

        .input-edit-odd {
            width: 100%;
            background-color: var(--bg-principal);
            border: 1px solid var(--laranja-bet);
            color: white;
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 4px;
        }

        .container-investimento-manual {
            background-color: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px dashed var(--cor-borda);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .container-investimento-manual label {
            font-size: 0.75rem;
            color: var(--texto-escuro);
            text-transform: uppercase;
        }

        .container-investimento-manual input {
            width: 120px;
            background-color: var(--bg-principal);
            border: 1px solid var(--cor-borda);
            color: var(--verde-sucesso);
            padding: 6px;
            border-radius: 4px;
            font-weight: bold;
            text-align: right;
        }

        .container-investimento-manual input:focus {
            border-color: var(--laranja-bet);
            outline: none;
        }

        .rodape-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            padding-top: 10px;
            border-top: 1px dashed var(--cor-borda);
            font-size: 0.8rem;
            color: var(--texto-escuro);
        }

        .rodape-card strong { color: var(--texto-claro); }

        .botoes-resultado {
            display: flex;
            gap: 5px;
        }

        .btn-res {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            opacity: 0.25;
            transition: opacity 0.2s;
        }

        .btn-res.verde { background-color: var(--verde-sucesso); }
        .btn-res.vermelho { background-color: var(--vermelho-erro); }
        
        .btn-res.ativo { opacity: 1; }

        .btn-reset-total {
            display: block;
            width: 100%;
            background: none;
            border: 1px dashed #3a3a40;
            color: var(--texto-escuro);
            padding: 10px;
            margin-top: 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Alavancagem Copa</h1>
        <button id="btn-config" class="toggle-config" onclick="alternarModoConfig()">⚙️ Editar ODDs</button>
    </header>

    <div class="config-banca">
        <div class="input-group">
            <label for="valor-inicial">Valor Inicial da Operação (R$)</label>
            <input type="number" id="valor-inicial" value="50" min="1" oninput="salvarValorInicial(); calcularTudo();">
        </div>

        <div id="painel-ajuste-manual" class="painel-edicao-banca" style="display: none;">
            <div class="input-group" style="margin-bottom: 0;">
                <label for="banca-manual" style="color: var(--laranja-bet);">Editar Valor Acumulado Corrente (R$)</label>
                <input type="number" id="banca-manual" placeholder="Deixe em branco para cálculo automático" min="0" oninput="salvarBancaManual(); calcularTudo();">
            </div>
        </div>

        <div class="painel-valores">
            <div class="bloco-valor">
                <span>Total Acumulado</span>
                <strong id="total-acumulado" style="color: var(--verde-sucesso)">R$ 50,00</strong>
            </div>
            <div class="bloco-valor" style="text-align: right;">
                <span>Jogos na Linha</span>
                <strong id="qtd-ativos">0</strong>
            </div>
        </div>
    </div>

    <div id="conteudo-jogos"></div>

    <button class="btn-reset-total" onclick="limparMemoriasLocais()">⚠️ Limpar Dados e Resetar App</button>
