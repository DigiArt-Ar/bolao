<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alavancagem - Copa</title>
    <style>
        :root {
            --bg-principal: #121214;
            --bg-card: #1a1a1e;
            --cor-borda: #29292e;
            --laranja-bet: #f25a22;
            --verde-sucesso: #00b37e;
            --vermelho-erro: #f75a68;
            --texto-claro: #e1e1e6;
            --texto-escuro: #8d8d99;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-principal); color: var(--texto-claro); padding: 15px; }
        
        header {
            text-align: center; margin-bottom: 20px; padding-bottom: 10px; 
            border-bottom: 1px solid var(--cor-borda); display: flex; 
            justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 1.2rem; color: var(--laranja-bet); text-transform: uppercase; }

        .toggle-config {
            background-color: #29292e; color: var(--texto-claro); border: 1px solid var(--laranja-bet);
            padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; cursor: pointer;
        }
        .toggle-config.ativo { background-color: var(--laranja-bet); color: white; }

        /* Painel do Topo - Sempre Visível */
        .config-banca {
            background-color: var(--bg-card); border-radius: 8px; padding: 15px;
            margin-bottom: 20px; border: 1px solid var(--cor-borda);
        }

        .painel-valores-topo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .bloco-topo span { display: block; font-size: 0.75rem; color: var(--texto-escuro); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        .bloco-topo strong { font-size: 1.3rem; display: block; }

        /* Painel de Configurações Oculto/Visível */
        .painel-config-gaveta {
            background-color: #1a1a1e; border: 1px dashed var(--laranja-bet);
            border-radius: 8px; padding: 15px; margin-bottom: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.8rem; color: var(--texto-claro); font-weight: bold; }
        .input-group input {
            background-color: var(--bg-principal); border: 1px solid var(--cor-borda);
            color: var(--texto-claro); padding: 10px; border-radius: 6px; font-size: 1rem; font-weight: bold;
        }
        .input-group input:focus { border-color: var(--laranja-bet); outline: none; }

        /* Estilos dos Cards dos Jogos */
        .dia-secao { margin-bottom: 20px; }
        .dia-titulo { font-size: 1rem; color: var(--laranja-bet); margin-bottom: 10px; padding-left: 5px; border-left: 3px solid var(--laranja-bet); }
        .lista-jogos { display: flex; flex-direction: column; gap: 10px; }
        
        .card-jogo {
            background-color: var(--bg-card); border-radius: 8px; padding: 15px;
            border: 1px solid var(--cor-borda); display: flex; flex-direction: column; gap: 12px;
        }
        .card-jogo.status-ganhou { border-color: var(--verde-sucesso); background-color: rgba(0, 179, 126, 0.01); }
        .card-jogo.status-perdeu { border-color: var(--vermelho-erro); background-color: rgba(247, 90, 104, 0.01); }

        .confronto-probabilidades { display: flex; justify-content: center; align-items: center; gap: 25px; font-size: 0.95rem; font-weight: bold; }
        .time-prob { display: flex; flex-direction: column; align-items: center; text-align: center; width: 110px; }
        .time-prob span:first-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .prob-badge { color: var(--laranja-bet); font-size: 0.85rem; margin-top: 4px; }
        .vs-divider { color: var(--texto-escuro); font-size: 0.85rem; }

        .botoes-odds { display: flex; gap: 10px; justify-content: center; }
        .btn-odd {
            flex: 1; max-width: 140px; background-color: var(--bg-principal); border: 1px solid var(--cor-borda);
            color: var(--texto-claro); padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-align: center;
        }
        .btn-odd span { display: block; font-size: 1.1rem; font-weight: bold; color: var(--laranja-bet); margin-top: 2px; }
        .btn-odd.selecionado { border-color: var(--laranja-bet); background-color: rgba(242, 90, 34, 0.1); }
        
        .rodape-card {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 5px; padding-top: 10px; border-top: 1px dashed var(--cor-borda); font-size: 0.8rem; color: var(--texto-escuro);
        }
        .rodape-card strong { color: var(--texto-claro); }

        .botoes-resultado { display: flex; gap: 5px; }
        .btn-res {
            border: none; width: 32px; height: 32px; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; color: white; opacity: 0.2;
        }
        .btn-res.verde { background-color: var(--verde-sucesso); }
        .btn-res.vermelho { background-color: var(--vermelho-erro); }
        .btn-res.ativo { opacity: 1; }

        .btn-reset-total {
            display: block; width: 100%; background: none; border: 1px dashed #3a3a40;
            color: var(--texto-escuro); padding: 10px; margin-top: 20px; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Alavancagem Copa</h1>
        <button id="btn-config" class="toggle-config" onclick="alternarModoConfig()">⚙️ Configurações</button>
    </header>

    <div class="config-banca">
        <div class="painel-valores-topo">
            <div class="bloco-topo">
                <span>Valor Inicial</span>
                <strong id="visor-inicial" style="color: var(--texto-claro)">R$ 50,00</strong>
            </div>
            <div class="bloco-topo" style="text-align: right;">
                <span>Acumulados Totais</span>
                <strong id="visor-total" style="color: var(--verde-sucesso)">R$ 50,00</strong>
            </div>
        </div>
    </div>

    <div id="gaveta-configuracao" class="painel-config-gaveta" style="display: none;">
        <h3 style="font-size: 0.9rem; color: var(--laranja-bet); text-transform: uppercase;">Ajustes de Banca</h3>
        
        <div class="input-group">
            <label for="cfg-valor-inicial">1. Mudar Valor Inicial da Operação (R$)</label>
            <input type="number" id="cfg-valor-inicial" value="50" min="1" oninput="ajustouValorInicialPai()">
        </div>

        <div class="input-group">
            <label for="cfg-proxima-entrada" style="color: #ffb84d;">2. Valor da Próxima Entrada (R$)</label>
            <input type="number" id="cfg-proxima-entrada" placeholder="Deixe vazio para usar Tudo" min="0" oninput="ajustouProximaEntradaManual()">
        </div>
        <p style="font-size: 0.75rem; color: var(--texto-escuro); line-height: 1.3;">
            * Ao estipular um valor aqui (Ex: R$ 200), o sistema vai reservar esse dinheiro para o próximo jogo pendente e subtrair imediatamente do visor de Acumulados Totais.
        </p>
    </div>

    <div id="conteudo-jogos"></div>

    <button class="btn-reset-total" onclick="limparMemoriasLocais()">⚠️ Limpar Tudo e Reiniciar App</button>

    <script>
        const dadosCopaOriginais = [
            { dia: "11/06", jogos: [{id:1, t1:"México", t2:"África do Sul", o1:1.45, o2:7.90}, {id:2, t1:"Coreia do Sul", t2:"República Tcheca", o1:2.75, o2:2.75}] },
            { dia: "12/06", jogos: [{id:3, t1:"Canadá", t2:"Bósnia-Herzegovina", o1:1.85, o2:4.35}, {id:4, t1:"EUA", t2:"Paraguai", o1:2.00, o2:3.90}] },
            { dia: "13/06", jogos: [{id:5, t1:"Catar", t2:"Suíça", o1:11.75, o2:1.26}, {id:6, t1:"Brasil", t2:"Marrocos", o1:1.60, o2:5.90}, {id:7, t1:"Haiti", t2:"Escócia", o1:7.20, o2:1.47}, {id:8, t1:"Austrália", t2:"Turquia", o1:4.55, o2:1.80}] },
            { dia: "14/06", jogos: [{id:9, t1:"Alemanha", t2:"Curaçao", o1:1.04, o2:30.00}, {id:10, t1:"Países Baixos", t2:"Japão", o1:1.98, o2:3.65}, {id:11, t1:"Costa do Marfim", t2:"Equador", o1:3.75, o2:2.32}, {id:12, t1:"Suécia", t2:"Tunísia", o1:1.95, o2:4.15}] },
            { dia: "15/06", jogos: [{id:13, t1:"Espanha", t2:"Cabo Verde", o1:1.11, o2:26.00}, {id:14, t1:"Bélgica", t2:"Egito", o1:1.67, o2:5.20}, {id:15, t1:"Arábia Saudita", t2:"Uruguai", o1:6.90, o2:1.50}, {id:16, t1:"Irã", t2:"Nova Zelândia", o1:1.87, o2:4.40}] },
            { dia: "16/06", jogos: [{id:17, t1:"França", t2:"Senegal", o1:1.45, o2:7.20}, {id:18, t1:"Iraque", t2:"Noruega", o1:14.00, o2:1.22}, {id:19, t1:"Argentina", t2:"Argélia", o1:1.42, o2:8.50}] },
            { dia: "17/06", jogos: [{id:20, t1:"Áustria", t2:"Jordânia", o1:1.34, o2:8.75}, {id:21, t1:"Portugal", t2:"RD Congo", o1:1.28, o2:10.75}, {id:22, t1:"Inglaterra", t2:"Croácia", o1:1.75, o2:4.70}, {id:23, t1:"Gana", t2:"Panamá", o1:1.98, o2:3.80}, {id:24, t1:"Uzbequistão", t2:"Colômbia", o1:8.25, o2:1.42}] }
        ];

        let dadosCopa = [];
        let escolhas = {}; 
        let ordemCronologicaDeCliques = [];
        let modoConfigAberto = false;
        
        let valorInicialBase = 50;
        let proximaEntradaEstipulada = null; // Guarda o valor do campo que você pediu!

        function calcularProbabilidadesReais(o1, o2) {
            const raw1 = 1 / o1; const raw2 = 1 / o2;
            const totalRaw = raw1 + raw2;
            const margem = 1.0 - (totalRaw * 0.85); 
            const p1 = Math.round((raw1 / totalRaw) * (1.0 - Math.max(0, margem)) * 100);
            const p2 = Math.round((raw2 / totalRaw) * (1.0 - Math.max(0, margem)) * 100);
            return { p1, p2 };
        }

        function carregarDadosDoCache() {
            try {
                dadosCopa = JSON.parse(localStorage.getItem('copa_d_v4')) || JSON.parse(JSON.stringify(dadosCopaOriginais));
                escolhas = JSON.parse(localStorage.getItem('copa_e_v4')) || {};
                ordemCronologicaDeCliques = JSON.parse(localStorage.getItem('copa_o_v4')) || [];
                
                if(localStorage.getItem('copa_vi_v4')) {
                    valorInicialBase = parseFloat(localStorage.getItem('copa_vi_v4'));
                    document.getElementById('cfg-valor-inicial').value = valorInicialBase;
                }
                if(localStorage.getItem('copa_pe_v4')) {
                    const pe = localStorage.getItem('copa_pe_v4');
                    proximaEntradaEstipulada = pe !== "null" ? parseFloat(pe) : null;
                    document.getElementById('cfg-proxima-entrada').value = proximaEntradaEstipulada !== null ? proximaEntradaEstipulada : "";
                }
            } catch(e) {
                dadosCopa = JSON.parse(JSON.stringify(dadosCopaOriginais));
                escolhas = {};
                ordemCronologicaDeCliques = [];
            }
        }

        function inicializarApp() {
            carregarDadosDoCache();
            renderizarInterface();
        }

        function renderizarInterface() {
            const container = document.getElementById('conteudo-jogos');
            if(!container) return;
            container.innerHTML = '';

            dadosCopa.forEach(secao => {
                const divDia = document.createElement('div');
                divDia.className = 'dia-secao';
                
                const titulo = document.createElement('div');
                titulo.className = 'dia-titulo';
                titulo.innerText = `Dia ${secao.dia}`;
                divDia.appendChild(titulo);

                const lista = document.createElement('div');
                lista.className = 'lista-jogos';

                secao.jogos.forEach(jogo => {
                    const escolha = escolhas[jogo.id] || null;
                    let statusClass = escolha && escolha.resultado ? `status-${escolha.resultado}` : '';

                    const probs = calcularProbabilidadesReais(jogo.o1, jogo.o2);
                    const card = document.createElement('div');
                    card.className = `card-jogo ${statusClass}`;

                    card.innerHTML = `
                        <div class="confronto-probabilidades">
                            <div class="time-prob"><span>${jogo.t1}</span><span class="prob-badge">${probs.p1}%</span></div>
                            <span class="vs-divider">VS</span>
                            <div class="time-prob"><span>${jogo.t2}</span><span class="prob-badge">${probs.p2}%</span></div>
                        </div>
                        <div class="botoes-odds">
                            <button class="btn-odd ${escolha && escolha.time === 1 ? 'selecionado' : ''}" onclick="selecionouOddCard(${jogo.id}, 1, ${jogo.o1})">
                                ODD <span>${jogo.o1.toFixed(2)}</span>
                            </button>
                            <button class="btn-odd ${escolha && escolha.time === 2 ? 'selecionado' : ''}" onclick="selecionouOddCard(${jogo.id}, 2, ${jogo.o2})">
                                ODD <span>${jogo.o2.toFixed(2)}</span>
                            </button>
                        </div>
                        <div class="rodape-card">
                            <div id="visor-card-calc-${jogo.id}">Entrada: R$ 0.00 | Retorno: R$ 0.00</div>
                            <div class="botoes-resultado">
                                <button class="btn-res verde ${escolha && escolha.resultado === 'ganhou' ? 'ativo' : ''}" onclick="definirResultadoCard(${jogo.id}, 'ganhou')">✓</button>
                                <button class="btn-res vermelho ${escolha && escolha.resultado === 'perdeu' ? 'ativo' : ''}" onclick="definirResultadoCard(${jogo.id}, 'perdeu')">✗</button>
                            </div>
                        </div>
                    `;
                    lista.appendChild(card);
                });

                divDia.appendChild(lista);
                container.appendChild(divDia);
            });

            rodarCalculoOficialBanca();
        }

        function alternarModoConfig() {
            modoConfigAberto = !modoConfigAberto;
            const gaveta = document.getElementById('gaveta-configuracao');
            const btn = document.getElementById('btn-config');
            if(modoConfigAberto) {
                gaveta.style.display = 'flex';
                btn.classList.add('ativo');
            } else {
                gaveta.style.display = 'none';
                btn.classList.remove('ativo');
            }
        }

        function ajustouValorInicialPai() {
            valorInicialBase = parseFloat(document.getElementById('cfg-valor-inicial').value) || 0;
            localStorage.setItem('copa_vi_v4', valorInicialBase);
            rodarCalculoOficialBanca();
        }

        function ajustouProximaEntradaManual() {
            const vStr = document.getElementById('cfg-proxima-entrada').value;
            if(vStr === '') {
                proximaEntradaEstipulada = null;
                localStorage.setItem('copa_pe_v4', "null");
            } else {
                proximaEntradaEstipulada = parseFloat(vStr) || 0;
                localStorage.setItem('copa_pe_v4', proximaEntradaEstipulada);
            }
            rodarCalculoOficialBanca();
        }

        function selecionouOddCard(jogoId, time, oddValor) {
            if (escolhas[jogoId] && escolhas[jogoId].time === time) {
                delete escolhas[jogoId];
                ordemCronologicaDeCliques = ordemCronologicaDeCliques.filter(id => id !== jogoId);
            } else {
                // Ao criar ou mudar, salvamos no estado se ele já foi resolvido para travar o passado
                if (!escolhas[jogoId]) {
                    escolhas[jogoId] = { time: time, odd: oddValor, resultado: null, entradaFixada: null, retornoFixado: null };
                } else {
                    escolhas[jogoId].time = time;
                    escolhas[jogoId].odd = oddValor;
                }
                if (!ordemCronologicaDeCliques.includes(jogoId)) {
                    ordemCronologicaDeCliques.push(jogoId);
                }
            }
            salvarCacheGlobal();
            renderizarInterface();
        }

        function definirResultadoCard(jogoId, status) {
            if (!escolhas[jogoId]) return;

            if (escolhas[jogoId].resultado === status) {
                escolhas[jogoId].resultado = null;
                escolhas[jogoId].entradaFixada = null;
                escolhas[jogoId].retornoFixado = null;
            } else {
                escolhas[jogoId].resultado = status;
            }
            salvarCacheGlobal();
            renderizarInterface();
        }

        function salvarCacheGlobal() {
            localStorage.setItem('escolhas_v4', JSON.stringify(escolhas));
            localStorage.setItem('copa_o_v4', JSON.stringify(ordemCronologicaDeCliques));
        }

        // A LÓGICA QUE VOCÊ EXPLICOU PASSO A PASSO:
        function rodarCalculoOficialBanca() {
            // Atualiza o visor estático de valor inicial
            document.getElementById('visor-inicial').innerText = `R$ ${valorInicialBase.toFixed(2)}`;

            let bancaFluida = valorInicialBase;

            // 1. Primeiro passamos limpando as simulações visuais dos cards
            dadosCopa.forEach(s => {
                s.jogos.forEach(j => {
                    const el = document.getElementById(`visor-card-calc-${j.id}`);
                    if(el) el.innerHTML = "Entrada: R$ 0.00 | Retorno: R$ 0.00";
                });
            });

            // 2. Calculamos o histórico linear dos jogos que já possuem GREEN ou RED fixados
            for (let i = 0; i < ordemCronologicaDeCliques.length; i++) {
                const id = ordemCronologicaDeCliques[i];
                const aposta = escolhas[id];
                if (!aposta) continue;

                // Se o jogo está PENDENTE, nós não processamos ele neste primeiro momento do histórico real
                if (aposta.resultado === null) continue;

                let entradaEfetiva = 0;
                
                // Se esse jogo antigo foi gravado com entrada fixa, respeita ela, senão pega a banca da época
                if (aposta.entradaFixada !== null) {
                    entradaEfetiva = aposta.entradaFixada;
                } else {
                    entradaEfetiva = bancaFluida; 
                    aposta.entradaFixada = entradaEfetiva;
                }

                let retornoEfetivo = entradaEfetiva * aposta.odd;
                aposta.retornoFixado = retornoEfetivo;

                // Atualiza o texto do card resolvido no passado
                const el = document.getElementById(`visor-card-calc-${id}`);
                if(el) {
                    el.innerHTML = `Entrada: <strong>R$ ${entradaEfetiva.toFixed(2)}</strong> | Retorno: <strong style="color:var(--verde-sucesso)">R$ ${retornoEfetivo.toFixed(2)}</strong>`;
                }

                // Desconta ou soma na banca real de histórico
                if (aposta.resultado === 'ganhou') {
                    bancaFluida = (bancaFluida - entradaEfetiva) + retornoEfetivo;
                } else if (aposta.resultado === 'perdeu') {
                    bancaFluida = (bancaFluida - entradaEfetiva);
                }
            }

            // --- AQUI ESTÁ A SUTILEZA DO QUE VOCÊ PEDIU ---
            // Agora a nossa 'bancaFluida' tem exatamente o somatório real de todos os seus Greens históricos.
            // Se você foi nas configurações e estipulou uma próxima entrada manual (ex: R$ 200,00):
            let valorInvestidoNoProximo = 0;
            
            if (proximaEntradaEstipulada !== null) {
                // Pega os 200 reais que você escolheu investir
                valorInvestidoNoProximo = Math.min(proximaEntradaEstipulada, bancaFluida);
                // Subtrai imediatamente do total acumulado! Se tinha 1000, o visor vai mostrar 800!
                bancaFluida = bancaFluida - valorInvestidoNoProximo;
            }

            // Atualiza o Painel Principal no topo da tela com o valor subtraído das entradas ativas
            document.getElementById('visor-total').innerText = `R$ ${bancaFluida.toFixed(2)}`;

            // 3. Agora aplicamos essa simulação/investimento no primeiro jogo da fila que estiver PENDENTE
            for (let i = 0; i < ordemCronologicaDeCliques.length; i++) {
                const id = ordemCronologicaDeCliques[i];
                const aposta = escolhas[id];
                if (!aposta || aposta.resultado !== null) continue;

                // Achou o jogo pendente! Se houver valor estipulado na configuração, aplica ele. 
                // Se não houver, ele usa a alavancagem total (tudo o que sobrou na banca).
                let entradaSimulada = (proximaEntradaEstipulada !== null) ? valorInvestidoNoProximo : bancaFluida;
                let retornoSimulado = entradaSimulada * aposta.odd;

                // Grava temporariamente no objeto para o momento que você clicar no botão de '✓ Check'
                aposta.entradaFixada = entradaSimulada;
                aposta.retornoFixado = retornoSimulado;

                const el = document.getElementById(`visor-card-calc-${id}`);
                if(el) {
                    el.innerHTML = `Entrada: <span style="color:#ffb84d; font-weight:bold;">R$ ${entradaSimulada.toFixed(2)}</span> | Retorno Projetado: <strong style="color:var(--verde-sucesso)">R$ ${retornoSimulado.toFixed(2)}</strong>`;
                }
                
                // Paramos no primeiro jogo pendente da fila, pois o investimento configurado foi direcionado para ele
                break;
            }
        }

        function limparMemoriasLocais() {
            if(confirm("Deseja realmente resetar e limpar o histórico de greens?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = inicializarApp;
    </script>
</body>
</html>
