<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Copa 2026 - Gestor de Chaves</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css">
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 20px; }
        .admin-panel { background: #34495e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .bracket { display: flex; gap: 40px; justify-content: center; margin-top: 50px; }
        .column { display: flex; flex-direction: column; gap: 20px; }
        .slot { width: 120px; height: 50px; border: 2px dashed #95a5a6; display: flex; align-items: center; justify-content: center; background: #ecf0f1; color: #2c3e50; border-radius: 4px; }
        input, select, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2>Painel Administrativo</h2>
        <input type="text" id="gameId" placeholder="ID do Jogo (ex: jogo1)">
        <input type="text" id="countryCode" placeholder="Sigla (ex: br, mx, jp)">
        <button onclick="salvarJogo()">Salvar Jogo</button>
        <button onclick="localStorage.clear(); location.reload()">Limpar Tudo</button>
    </div>

    <div class="bracket">
        <div class="column">
            <h3>Oitavas</h3>
            <div id="jogo1" class="slot">Vazio</div>
            <div id="jogo2" class="slot">Vazio</div>
        </div>
        <div class="column">
            <h3>Quartas</h3>
            <div id="q1" class="slot">Vazio</div>
        </div>
    </div>

    <script>
        // Carrega os dados salvos no localStorage ao abrir
        function carregarDados() {
            const slots = ['jogo1', 'jogo2', 'q1'];
            slots.forEach(id => {
                const dado = localStorage.getItem(id);
                if (dado) {
                    document.getElementById(id).innerHTML = `<span class="fi fi-${dado}"></span>`;
                }
            });
        }

        // Salva o jogo no localStorage
        function salvarJogo() {
            const id = document.getElementById('gameId').value;
            const code = document.getElementById('countryCode').value;
            localStorage.setItem(id, code);
            carregarDados();
        }

        window.onload = carregarDados;
    </script>
</body>
</html>
