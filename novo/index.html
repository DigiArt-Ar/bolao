<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Copa 2026 - Tabela Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icons/7.2.3/css/flag-icons.min.css">
    <style>
        body { background: #333; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .bracket { display: flex; gap: 20px; padding: 20px; }
        .column { display: flex; flex-direction: column; justify-content: space-around; gap: 10px; }
        .match { border: 1px solid #555; padding: 10px; background: #444; border-radius: 5px; width: 140px; position: relative; }
        .team { cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 4px; font-size: 12px; }
        .team:hover { background: #666; }
        .winner { border: 1px dashed #f1c40f; min-height: 20px; margin-top: 5px; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Copa 2026</h1>
    <div class="bracket" id="bracket">
        <div class="column">
            <div class="match" id="m1">
                <div class="team" onclick="selectWinner(this, 'q1')"><span class="fi fi-mx"></span> México</div>
                <div class="team" onclick="selectWinner(this, 'q1')"><span class="fi fi-ch"></span> Suíça</div>
                <div class="winner" id="q1" onclick="clearSlot(this)"></div>
            </div>
            <div class="match" id="m2">
                <div class="team" onclick="selectWinner(this, 'q2')"><span class="fi fi-br"></span> Brasil</div>
                <div class="team" onclick="selectWinner(this, 'q2')"><span class="fi fi-jp"></span> Japão</div>
                <div class="winner" id="q2" onclick="clearSlot(this)"></div>
            </div>
        </div>
        </div>

    <script>
        function selectWinner(element, destId) {
            const dest = document.getElementById(destId);
            dest.innerHTML = element.innerHTML;
        }

        function clearSlot(element) {
            element.innerHTML = "";
        }
    </script>
</body>
</html>
